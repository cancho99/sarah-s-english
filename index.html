async function fsGet(col, id, attempts = 3) {
  for (let i = 0; i < attempts; i++) {
    try {
      const snap = await db.collection(col).doc(id).get();
      return snap.exists ? snap.data() : null; // null here means "genuinely doesn't exist"
    } catch (e) {
      console.error("fsGet error", e);
      if (i === attempts - 1) throw e; // exhausted retries: let the caller know this FAILED, not "empty"
      await new Promise((r) => setTimeout(r, 500 * (i + 1)));
    }
  }
}
async function fsSet(col, id, data) {
  try {
    await db.collection(col).doc(id).set(data);
    return true;
  } catch (e) {
    console.error("fsSet error", e);
    return false;
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function splitFirst(line, delim) {
  const idx = line.indexOf(delim);
  if (idx === -1) return null;
  return [line.slice(0, idx).trim(), line.slice(idx + delim.length).trim()];
}
function parseVocabPaste(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const rows = [];
  for (const line of lines) {
    let pair = splitFirst(line, " - ") || splitFirst(line, "\t") || splitFirst(line, ":") || splitFirst(line, ",");
    if (!pair) {
      const m = line.split(/\s{2,}/);
      if (m.length >= 2) pair = [m[0].trim(), m.slice(1).join(" ").trim()];
    }
    if (pair) {
      const [word, meaning] = pair;
      if (word && meaning) rows.push({ word, meaning });
    }
  }
  return rows;
}
function parseExamPaste(text) {
  const blocks = text.split(/\n\s*\n/).map((b) => b.trim()).filter(Boolean);
  const out = [];
  for (const block of blocks) {
    const lines = block.split("\n").map((l) => l.trim()).filter(Boolean);
    if (lines.length < 3) continue;
    const isMarker = (l) => /^(?:[①②③④⑤]|[1-9][.\)]|[A-Da-d][.\)])\s*/.test(l);
    const isAnswer = (l) => /^정답\s*[:：]?/.test(l);
    const qLines = [];
    let i = 0;
    while (i < lines.length && !isMarker(lines[i]) && !isAnswer(lines[i])) { qLines.push(lines[i]); i++; }
    if (qLines.length === 0) continue;
    qLines[0] = qLines[0].replace(/^\d+[.\)]\s*/, "");
    const qText = qLines.join("\n");
    const choices = [];
    let answerIdx = 0;
    for (; i < lines.length; i++) {
      const line = lines[i];
      const ansMatch = line.match(/^정답\s*[:：]?\s*([1-9A-Da-d])/);
      if (ansMatch) {
        const a = ansMatch[1];
        answerIdx = /[1-9]/.test(a) ? parseInt(a, 10) - 1 : a.toUpperCase().charCodeAt(0) - 65;
        continue;
      }
      const marker = line.match(/^(?:[①②③④⑤]|[1-9][.\)]|[A-Da-d][.\)])\s*/);
      if (marker) choices.push(line.slice(marker[0].length).trim());
      else if (choices.length > 0) choices[choices.length - 1] += " " + line;
    }
    if (qText && choices.length >= 2) out.push({ q: qText, choices, answer: Math.min(Math.max(answerIdx, 0), choices.length - 1) });
  }
  return out;
}
function normText(s) { return (s || "").replace(/\s+/g, "").toLowerCase(); }
function checkVocabAnswer(userAnswer, correctMeaning) {
  const norm = normText(userAnswer);
  if (!norm) return false;
  const segments = correctMeaning.split(/[,;/·]|\(|\)|\[|\]/).map((s) => normText(s)).filter(Boolean);
  return segments.some((seg) => seg === norm || (seg.length >= 2 && norm.length >= 2 && (seg.includes(norm) || norm.includes(seg))));
}
async function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function App() {
  const [screen, setScreen] = useState("role");
  const [roster, setRoster] = useState(null);
  const [teacherAuth, setTeacherAuth] = useState(null);
  const [session, setSession] = useState(null);
  const [dataCache, setDataCache] = useState({});
  const [selectedStudentId, setSelectedStudentId] = useState(null);
  const [err, setErr] = useState("");
  const [loadError, setLoadError] = useState(false);
  const [loadTick, setLoadTick] = useState(0);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoadError(false);
      try {
        const r = await fsGet("meta", "roster");
        if (cancelled) return;
        setRoster((r && r.list) || []);
        const ta = await fsGet("meta", "teacherAuth");
        if (cancelled) return;
        setTeacherAuth(ta);
      } catch (e) {
        if (!cancelled) setLoadError(true);
      }
    })();
    return () => { cancelled = true; };
  }, [loadTick]);

  async function ensureData(id) {
    if (dataCache[id]) return dataCache[id];
    const d = (await fsGet("studentData", id)) || emptyData(); // throws on real failure, caller must handle
    setDataCache((prev) => ({ ...prev, [id]: d }));
    return d;
  }
  async function updateData(id, updater) {
    const cur = await ensureData(id);
    const next = updater(cur);
    setDataCache((prev) => ({ ...prev, [id]: next }));
    await fsSet("studentData", id, next);
  }
  async function saveRosterList(list) {
    setRoster(list);
    await fsSet("meta", "roster", { list });
  }

  function logout() {
    setSession(null); setSelectedStudentId(null); setErr(""); setScreen("role");
  }

  if (loadError) {
    return html`
      <div style=${{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: C.slate, gap: 14, padding: 20, textAlign: "center" }}>
        <div style=${{ fontSize: 15, color: C.navy, fontWeight: 700 }}>데이터를 불러오지 못했어요</div>
        <div style=${{ fontSize: 13 }}>네트워크 상태를 확인하고 다시 시도해 주세요. (안전을 위해, 불러오기 전에는 아무 것도 저장하지 않아요)</div>
        <${Button} variant="gold" onClick=${() => setLoadTick((n) => n + 1)}>다시 시도<//>
      </div>
    `;
  }

  if (roster === null) {
    return html`<div style=${{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.slate }}>불러오는 중...</div>`;
  }

  return html`
    <div style=${{ minHeight: "100vh", background: C.ivory }}>
      <${TopBar} tagline=${screen === "teacherDash" ? "Teacher Console" : screen === "studentDash" ? "Student Portal" : screen === "parentDash" ? "Parent Portal" : "learning, tracked with care"} />
      <div style=${{ maxWidth: 480, margin: "0 auto", padding: "18px 16px 60px" }}>
        ${screen === "role" && html`<${RoleSelect} setScreen=${setScreen} />`}
        ${screen === "teacherLogin" && html`<${TeacherLogin} teacherAuth=${teacherAuth} onBack=${() => setScreen("role")}
          onSetPass=${async (p) => { const ta = { passcode: p }; setTeacherAuth(ta); await fsSet("meta", "teacherAuth", ta); setSession({ role: "teacher" }); setScreen("teacherDash"); }}
          onLogin=${(p) => { if (teacherAuth && p === teacherAuth.passcode) { setSession({ role: "teacher" }); setScreen("teacherDash"); } else setErr("비밀번호가 맞지 않아요."); }}
          err=${err} />`}
        ${screen === "studentLogin" && html`<${StudentParentLogin} mode="student" roster=${roster} onBack=${() => setScreen("role")}
          onLogin=${(s) => { setSession({ role: "student", student: s }); setScreen("studentDash"); }} />`}
        ${screen === "parentLogin" && html`<${StudentParentLogin} mode="parent" roster=${roster} onBack=${() => setScreen("role")}
          onLogin=${(s) => { setSession({ role: "parent", student: s }); setScreen("parentDash"); }} />`}
        ${screen === "teacherDash" && html`<${TeacherDash} roster=${roster} saveRosterList=${saveRosterList}
          selectedStudentId=${selectedStudentId} setSelectedStudentId=${setSelectedStudentId}
          ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout} />`}
        ${screen === "studentDash" && html`<${StudentDash} student=${session.student} ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout} />`}
        ${screen === "parentDash" && html`<${ParentDash} student=${session.student} ensureData=${ensureData} dataCache=${dataCache} onLogout=${logout} />`}
      </div>
    </div>
  `;
}

// ---------- Student/Parent login ----------
function StudentParentLogin({ mode, roster, onBack, onLogin }) {
  const [code, setCode] = useState(""); const [err, setErr] = useState("");
  function submit() {
    const trimmed = code.trim();
    if (!trimmed) { setErr("코드를 입력해 주세요."); return; }
    const s = roster.find((r) => (mode === "student" ? r.studentCode : r.parentCode) === trimmed);
    if (!s) { setErr("코드가 맞지 않아요. 선생님께 확인해 주세요."); return; }
    onLogin(s);
  }
  return html`
    <div>
      <${BackBtn} onClick=${onBack} />
      <${SectionLabel} n=${2} label=${mode === "student" ? "STUDENT LOGIN" : "PARENT LOGIN"} />
      ${roster.length === 0 ? html`<${Empty} text="아직 등록된 학생이 없어요. 선생님께 등록을 요청해 주세요." />` : html`
        <${Card}>
          <${Field} label=${mode === "student" ? "학생 코드" : "학부모 코드"}>
            <input style=${inputStyle} value=${code} onChange=${(e) => setCode(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && submit()} placeholder="선생님께 받은 코드를 입력하세요" autoFocus />
          <//>
          ${err && html`<div style=${{ color: C.danger, fontSize: 12, marginBottom: 8 }}>${err}</div>`}
          <${Button} variant="gold" onClick=${submit}>접속하기<//>
        <//>
      `}
    </div>
  `;
}

// ---------- Teacher dashboard ----------
function TeacherDash({ roster, saveRosterList, selectedStudentId, setSelectedStudentId, ensureData, updateData, dataCache, onLogout }) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState(""); const [sc, setSc] = useState(""); const [pc, setPc] = useState("");
  const [addErr, setAddErr] = useState("");
  const selected = roster.find((r) => r.id === selectedStudentId);

  useEffect(() => { if (selectedStudentId) ensureData(selectedStudentId); }, [selectedStudentId]);

  async function addStudent() {
    if (!name || !sc || !pc) return;
    const dupe = roster.some((r) => r.studentCode === sc || r.parentCode === sc || r.studentCode === pc || r.parentCode === pc);
    if (dupe) { setAddErr("이미 사용 중인 코드예요. 다른 코드를 입력해 주세요."); return; }
    const s = { id: uid(), name, studentCode: sc, parentCode: pc };
    await saveRosterList([...roster, s]);
    setName(""); setSc(""); setPc(""); setAddErr(""); setShowAdd(false);
  }
  async function removeStudent(id) {
    await saveRosterList(roster.filter((r) => r.id !== id));
    if (selectedStudentId === id) setSelectedStudentId(null);
  }

  if (!selected) {
    return html`

function VocabEditor({ data, updateData }) {

  const [showPaste, setShowPaste] = useState(false); const [pasteText, setPasteText] = useState(""); const [pasteMsg, setPasteMsg] = useState("");

  function runParse() {
    const parsed = parseVocabPaste(pasteText);
    if (parsed.length === 0) { setPasteMsg("인식된 단어가 없어요. 형식을 확인해 주세요."); return; }
    setWords(parsed); setPasteMsg(`${parsed.length}개 단어를 불러왔어요. 아래에서 확인 후 저장하세요.`); setShowPaste(false); setPasteText("");
  }
  function setRow(i, key, val) { setWords((w) => w.map((row, idx) => (idx === i ? { ...row, [key]: val } : row))); }
  function addRow() { setWords((w) => [...w, { word: "", meaning: "" }]); }
  function removeRow(i) { setWords((w) => w.filter((_, idx) => idx !== i)); }

    const clean = words.filter((w) => w.word && w.meaning);
    if (!title || clean.length < 2) return;
    await updateData((d) => ({ ...d, vocabTests: [{ id: uid(), title, date: today(), words: clean }, ...d.vocabTests] }));
    setTitle(""); setWords([{ word: "", meaning: "" }]); setCreating(false);

          ${!showPaste ? html`

            <${Card} style=${{ background: C.ivory }}>
              <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6 }}>한 줄에 단어 하나씩, "단어 - 뜻" 형식으로 붙여넣어 주세요. 뜻이 여러 개면 콤마(,)나 세미콜론(;)으로 이어서 써도 돼요.</div>
              <textarea style=${{ ...inputStyle, minHeight: 110, fontFamily: "monospace", fontSize: 12.5 }} placeholder=${"apple - 사과\nhesitate - 주저하다, 망설이다"} value=${pasteText} onChange=${(e) => setPasteText(e.target.value)} />
              <div style=${{ display: "flex", gap: 8, marginTop: 8 }}>
                <${Button} variant="gold" onClick=${runParse}>가져오기<//>
                <${Button} variant="ghost" onClick=${() => setShowPaste(false)}>취소<//>
              </div>
            <//>
          `}
          ${pasteMsg && html`<div style=${{ fontSize: 12, color: C.navy, marginBottom: 10 }}>${pasteMsg}</div>`}
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6, fontWeight: 600 }}>단어 목록 (최소 2개, 4지선다로 출제됩니다)</div>
          ${words.map((w, i) => html`
            <div key=${i} style=${{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
              <input style=${{ ...inputStyle, flex: 1 }} placeholder="단어" value=${w.word} onChange=${(e) => setRow(i, "word", e.target.value)} />
              <input style=${{ ...inputStyle, flex: 1 }} placeholder="뜻" value=${w.meaning} onChange=${(e) => setRow(i, "meaning", e.target.value)} />
              ${words.length > 1 && html`<button onClick=${() => removeRow(i)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>`}
            </div>
          `)}
          <${Button} variant="ghost" onClick=${addRow} style=${{ marginBottom: 12 }}>+ 단어 추가<//>
          <div style=${{ display: "flex", gap: 8 }}>

        const results = data.vocabResults.filter((r) => r.testId === t.id);
        return html`
          <${Card} key=${t.id}>
            <div style=${{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style=${{ fontWeight: 700, color: C.navy }}>${t.title}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>${fmtDate(t.date)} · 단어 ${t.words.length}개</div>
              </div>
              <button onClick=${() => removeTest(t.id)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>

function ExamEditor({ data, updateData }) {
  const [creating, setCreating] = useState(false); const [title, setTitle] = useState("");
  const [questions, setQuestions] = useState([{ q: "", choices: ["", ""], answer: 0 }]);
  const [showPaste, setShowPaste] = useState(false); const [pasteText, setPasteText] = useState(""); const [pasteMsg, setPasteMsg] = useState("");

  function runParse() {
    const parsed = parseExamPaste(pasteText);
    if (parsed.length === 0) { setPasteMsg("인식된 문제가 없어요. 형식을 확인해 주세요."); return; }
    setQuestions(parsed); setPasteMsg(`${parsed.length}개 문제를 불러왔어요. 아래에서 확인 후 저장하세요.`); setShowPaste(false); setPasteText("");
  }
  function setQ(i, val) { setQuestions((qs) => qs.map((row, idx) => (idx === i ? { ...row, q: val } : row))); }
  function setChoice(qi, ci, val) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: row.choices.map((c, cidx) => (cidx === ci ? val : c)) } : row))); }
  function setAnswer(qi, ci) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, answer: ci } : row))); }
  function addChoice(qi) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: [...row.choices, ""] } : row))); }
  function removeChoice(qi, ci) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: row.choices.filter((_, cidx) => cidx !== ci), answer: row.answer === ci ? 0 : row.answer > ci ? row.answer - 1 : row.answer } : row))); }
  function addQuestion() { setQuestions((qs) => [...qs, { q: "", choices: ["", ""], answer: 0 }]); }
  function removeQuestion(i) { setQuestions((qs) => qs.filter((_, idx) => idx !== i)); }
  async function save() {
    const clean = questions.filter((q) => q.q && q.choices.every((c) => c) && q.choices.length >= 2);
    if (!title || clean.length === 0) return;
    await updateData((d) => ({ ...d, examTests: [{ id: uid(), title, date: today(), questions: clean }, ...d.examTests] }));
    setTitle(""); setQuestions([{ q: "", choices: ["", ""], answer: 0 }]); setCreating(false);
  }
  async function removeTest(id) { await updateData((d) => ({ ...d, examTests: d.examTests.filter((t) => t.id !== id) })); }

  return html`
    <div>
      ${!creating ? html`
        <${Button} variant="ghost" onClick=${() => setCreating(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 12 }}>+ 새 추가 시험 만들기<//>
      ` : html`
        <${Card}>
          <${Field} label="시험 이름"><input style=${inputStyle} value=${title} onChange=${(e) => setTitle(e.target.value)} placeholder="예: 관계대명사 추가 문제" /><//>
          ${!showPaste ? html`
            <${Button} variant="ghost" onClick=${() => setShowPaste(true)} style=${{ marginBottom: 12 }}>붙여넣기로 한번에 가져오기<//>
          ` : html`
            <${Card} style=${{ background: C.ivory }}>
              <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6 }}>문제 사이는 빈 줄로 구분해 주세요.</div>
              <textarea style=${{ ...inputStyle, minHeight: 160, fontFamily: "monospace", fontSize: 12, whiteSpace: "pre" }}
                placeholder=${"1. 다음 중 관계대명사가 알맞은 것은?\n1) who\n2) which\n3) that\n4) whose\n정답: 1"}
                value=${pasteText} onChange=${(e) => setPasteText(e.target.value)} />
              <div style=${{ display: "flex", gap: 8, marginTop: 8 }}>
                <${Button} variant="gold" onClick=${runParse}>가져오기<//>
                <${Button} variant="ghost" onClick=${() => setShowPaste(false)}>취소<//>
              </div>
            <//>
          `}
          ${pasteMsg && html`<div style=${{ fontSize: 12, color: C.navy, marginBottom: 10 }}>${pasteMsg}</div>`}
          ${questions.map((q, qi) => html`
            <div key=${qi} style=${{ border: `1px solid ${C.line}`, borderRadius: 4, padding: 10, marginBottom: 10 }}>
              <div style=${{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <div style=${{ fontSize: 12, color: C.gold, fontWeight: 700 }}>문제 ${qi + 1}</div>
                ${questions.length > 1 && html`<button onClick=${() => removeQuestion(qi)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>`}
              </div>
              <textarea style=${{ ...inputStyle, minHeight: 50, marginBottom: 8 }} placeholder="문제 내용" value=${q.q} onChange=${(e) => setQ(qi, e.target.value)} />
              ${q.choices.map((c, ci) => html`
                <div key=${ci} style=${{ display: "flex", gap: 6, alignItems: "center", marginBottom: 5 }}>
                  <input type="radio" checked=${q.answer === ci} onChange=${() => setAnswer(qi, ci)} />
                  <input style=${{ ...inputStyle, flex: 1 }} placeholder=${`보기 ${ci + 1}`} value=${c} onChange=${(e) => setChoice(qi, ci, e.target.value)} />
                  ${q.choices.length > 2 && html`<button onClick=${() => removeChoice(qi, ci)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>`}
                </div>
              `)}
              <button onClick=${() => addChoice(qi)} style=${{ background: "none", border: "none", color: C.navy, fontSize: 12, cursor: "pointer", padding: 0, marginTop: 4 }}>+ 보기 추가</button>
              <div style=${{ fontSize: 11, color: C.slate, marginTop: 4 }}>라디오 버튼으로 정답을 표시하세요.</div>
            </div>
          `)}
          <${Button} variant="ghost" onClick=${addQuestion} style=${{ marginBottom: 12 }}>+ 문제 추가<//>
          <div style=${{ display: "flex", gap: 8 }}>
            <${Button} variant="gold" onClick=${save}>저장<//>
            <${Button} variant="ghost" onClick=${() => setCreating(false)}>취소<//>
          </div>
        <//>
      `}
      <${SectionLabel} n=${2} label="등록된 시험" />
      ${data.examTests.length === 0 && html`<${Empty} text="아직 만든 시험이 없어요." />`}
      ${data.examTests.map((t) => {
        const results = data.examResults.filter((r) => r.testId === t.id);
        return html`
          <${Card} key=${t.id}>
            <div style=${{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style=${{ fontWeight: 700, color: C.navy }}>${t.title}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>${fmtDate(t.date)} · 문제 ${t.questions.length}개</div>
              </div>
              <button onClick=${() => removeTest(t.id)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>
            </div>
            ${results.length === 0 ? html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 8 }}>아직 응시하지 않았어요.</div>` : html`
              <div style=${{ marginTop: 8, borderTop: `1px solid ${C.line}`, paddingTop: 8 }}>
                ${results.map((r) => html`<div key=${r.id} style=${{ fontSize: 12.5, marginBottom: 3 }}>${fmtDate(r.date)} 응시 — <b>${r.score}</b> / ${r.total}</div>`)}
              </div>
            `}
          <//>
        `;
      })}
    </div>
  `;
}

// ---------- Student dashboard ----------
function StudentDash({ student, ensureData, updateData, dataCache, onLogout }) {
  const [tab, setTab] = useState("logs");
  const [data, setData] = useState(null);
  const [activeTest, setActiveTest] = useState(null);

  useEffect(() => { (async () => { const d = await ensureData(student.id); setData(d); })(); }, [student.id]);
  useEffect(() => { if (dataCache[student.id]) setData(dataCache[student.id]); }, [dataCache, student.id]);

  const tabs = [
    { key: "logs", label: "오늘의 학습", icon: "📘" },
    { key: "homework", label: "숙제", icon: "📝" },
    { key: "vocab", label: "단어 재시험", icon: "🔤" },
    { key: "exam", label: "추가 시험", icon: "🗒" },
  ];

  if (!data) return html`<${Empty} text="불러오는 중..." />`;

  if (activeTest) {
    return html`<${TestTaker} activeTest=${activeTest} onExit=${() => setActiveTest(null)}
      onSubmit=${async (score, total) => {
        try {
          if (activeTest.type === "vocab") await updateData(student.id, (d) => ({ ...d, vocabResults: [{ id: uid(), testId: activeTest.test.id, date: today(), score, total }, ...d.vocabResults] }));
          else await updateData(student.id, (d) => ({ ...d, examResults: [{ id: uid(), testId: activeTest.test.id, date: today(), score, total }, ...d.examResults] }));
        } catch (e) {
          console.error("결과 저장 실패", e);
        }
        setActiveTest(null);
      }} />`;
  }

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style=${{ ...serif, fontSize: 19, color: C.navy }}>${student.name} 학생</div>
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>로그아웃</button>
      </div>
      <${Tabs} tabs=${tabs} active=${tab} onChange=${setTab} />

      ${tab === "logs" && (data.logs.length === 0 ? html`<${Empty} text="아직 등록된 학습 기록이 없어요." />` : data.logs.map((l) => html`
        <${Card} key=${l.id}><div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>${fmtDate(l.date)}</div><div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${l.content}</div><//>
      `))}

      ${tab === "homework" && ((data.homework || []).length === 0 ? html`<${Empty} text="아직 등록된 숙제가 없어요." />` :
        (data.homework || []).map((h) => html`<${HomeworkStudentCard} key=${h.id} h=${h} studentId=${student.id} updateData=${updateData} />`))}

      ${tab === "vocab" && (data.vocabTests.length === 0 ? html`<${Empty} text="등록된 단어 재시험이 없어요." />` : data.vocabTests.map((t) => {
        const myResults = data.vocabResults.filter((r) => r.testId === t.id);
        return html`
          <${Card} key=${t.id}>
            <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style=${{ fontWeight: 700, color: C.navy }}>${t.title}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>단어 ${t.words.length}개</div>
                ${myResults.length > 0 && html`<div style=${{ fontSize: 12, marginTop: 6 }}>✓ 최근 결과: ${myResults[0].score} / ${myResults[0].total}</div>`}
              </div>
              <${Button} variant=${myResults.length ? "ghost" : "gold"} onClick=${() => setActiveTest({ type: "vocab", test: t })}>${myResults.length ? "다시 풀기" : "응시하기"}<//>
            </div>
          <//>
        `;
      }))}

      ${tab === "exam" && (data.examTests.length === 0 ? html`<${Empty} text="등록된 추가 시험이 없어요." />` : data.examTests.map((t) => {
        const myResults = data.examResults.filter((r) => r.testId === t.id);
        return html`
          <${Card} key=${t.id}>
            <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style=${{ fontWeight: 700, color: C.navy }}>${t.title}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>문제 ${t.questions.length}개</div>
                ${myResults.length > 0 && html`<div style=${{ fontSize: 12, marginTop: 6 }}>✓ 최근 결과: ${myResults[0].score} / ${myResults[0].total}</div>`}
              </div>
              <${Button} variant=${myResults.length ? "ghost" : "gold"} onClick=${() => setActiveTest({ type: "exam", test: t })}>${myResults.length ? "다시 풀기" : "응시하기"}<//>
            </div>
          <//>
        `;
      }))}
    </div>
  `;
}

function HomeworkStudentCard({ h, studentId, updateData }) {
  const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const inputId = `hwphoto-${h.id}`;
  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setErr(""); setBusy(true);
    try {
      const dataUrl = await compressImage(file, 900, 0.6);
      if (dataUrl.length > 900000) { setErr("사진 용량이 너무 커요. 다른 사진으로 시도해 주세요."); setBusy(false); return; }
      await updateData(studentId, (d) => ({ ...d, homework: (d.homework || []).map((x) => (x.id === h.id ? { ...x, photo: dataUrl, done: true } : x)) }));
    } catch { setErr("사진을 처리하는 데 문제가 있었어요. 다시 시도해 주세요."); }
    setBusy(false);
  }
  async function removePhoto() { await updateData(studentId, (d) => ({ ...d, homework: (d.homework || []).map((x) => (x.id === h.id ? { ...x, photo: null } : x)) })); }
  async function toggleDone() { await updateData(studentId, (d) => ({ ...d, homework: (d.homework || []).map((x) => (x.id === h.id ? { ...x, done: !x.done } : x)) })); }

  return html`
    <${Card}>
      <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>${fmtDate(h.assignedDate)} 부여 · 기한 ${fmtDate(h.dueDate)}</div>
      <div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${h.content}</div>
      ${h.photo && html`
        <div style=${{ marginTop: 8 }}>
          <img src=${h.photo} style=${{ maxWidth: 160, borderRadius: 4, border: `1px solid ${C.line}`, display: "block" }} />
          <button onClick=${removePhoto} style=${{ background: "none", border: "none", color: C.slate, fontSize: 11.5, cursor: "pointer", padding: 0, marginTop: 4 }}>사진 지우고 다시 올리기</button>
        </div>
      `}
      <div style=${{ display: "flex", alignItems: "center", gap: 12, marginTop: 10, flexWrap: "wrap" }}>
        <label htmlFor=${inputId} style=${{ fontSize: 12.5, fontWeight: 600, padding: "8px 14px", borderRadius: 3, border: `1px solid ${C.navy}`, color: C.navy, cursor: "pointer" }}>
          ${busy ? "업로드 중..." : h.photo ? "인증샷 다시 올리기" : "인증샷 올리기"}
        </label>
        <input id=${inputId} type="file" accept="image/*" capture="environment" onChange=${handleFile} style=${{ display: "none" }} disabled=${busy} />
        <div onClick=${toggleDone} style=${{ display: "inline-flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 12.5, color: h.done ? C.gold : C.slate, fontWeight: 600 }}>
          ${h.done ? "✓ 완료함" : "완료로 표시하기"}
        </div>
      </div>
      ${err && html`<div style=${{ fontSize: 11.5, color: C.danger, marginTop: 6 }}>${err}</div>`}
    <//>
  `;
}

function TestTaker({ activeTest, onExit, onSubmit }) {
  const { type, test } = activeTest;
  const questions = type === "vocab" ? test.words : test.questions;
  const total = questions.length;
  const [answers, setAnswers] = useState(type === "vocab" ? Array(total).fill("") : Array(total).fill(null));
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [breakdown, setBreakdown] = useState(null);

  function pick(qi, val) { if (submitted) return; setAnswers((a) => a.map((v, idx) => (idx === qi ? val : v))); }

  function submit() {
    let score = 0; const rows = [];
    questions.forEach((q, i) => {
      if (type === "vocab") {
        const ok = checkVocabAnswer(answers[i], q.meaning);
        if (ok) score++;
        rows.push({ prompt: q.word, given: answers[i] || "(빈칸)", correct: q.meaning, ok });
      } else {
        const ok = answers[i] === q.answer;
        if (ok) score++;
        rows.push({ prompt: q.q, given: answers[i] != null ? q.choices[answers[i]] : "(선택 안 함)", correct: q.choices[q.answer], ok });
      }
    });
    setResult(score); setBreakdown(rows); setSubmitted(true);
  }

  if (submitted) {
    return html`
      <div>
        <${Card} style=${{ textAlign: "center", padding: 28 }}>
          <div style=${{ ...serif, fontSize: 20, color: C.navy, marginBottom: 8 }}>${test.title}</div>
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 16 }}>채점 결과</div>
          <div style=${{ fontSize: 34, ...serif, color: C.gold }}>${result} <span style=${{ fontSize: 18, color: C.slate }}>/ ${total}</span></div>
        <//>
        ${breakdown && html`
          <${Card}>
            ${breakdown.map((r, i) => html`
              <div key=${i} style=${{ padding: "8px 0", borderBottom: i < breakdown.length - 1 ? `1px solid ${C.line}` : "none" }}>
                <div style=${{ fontSize: 12.5, fontWeight: 700, color: C.navy, whiteSpace: "pre-wrap" }}>${i + 1}. ${r.prompt}</div>
                <div style=${{ fontSize: 12, marginTop: 3, color: r.ok ? C.navy : C.danger }}>내 답: ${r.given} ${r.ok ? "✓" : "✗"}</div>
                ${!r.ok && html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 1 }}>정답: ${r.correct}</div>`}
              </div>
            `)}
          <//>
        `}
        <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} onClick=${() => onSubmit(result, total)}>결과 저장하고 나가기<//>
      </div>
    `;
  }

  return html`
    <div>
      <${BackBtn} onClick=${onExit} />
      <div style=${{ ...serif, fontSize: 18, color: C.navy, marginBottom: 12 }}>${test.title}</div>
      ${questions.map((q, qi) => html`
        <${Card} key=${qi}>
          <div style=${{ fontSize: 13, fontWeight: 700, color: C.navy, marginBottom: 10, whiteSpace: "pre-wrap" }}>${qi + 1}. ${type === "vocab" ? q.word : q.q}</div>
          ${type === "vocab" ? html`
            <input style=${inputStyle} placeholder="뜻을 입력하세요" value=${answers[qi]} onChange=${(e) => pick(qi, e.target.value)} />
          ` : q.choices.map((opt, oi) => {
            const selected = answers[qi] === oi;
            return html`
              <div key=${oi} onClick=${() => pick(qi, oi)} style=${{ padding: "9px 12px", border: `1px solid ${selected ? C.gold : C.line}`, background: selected ? "#FBF4EA" : C.white, borderRadius: 3, marginBottom: 6, fontSize: 13, cursor: "pointer" }}>${opt}</div>
            `;
          })}
        <//>
      `)}
      <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} disabled=${answers.some((a) => a === null || a === "")} onClick=${submit}>제출하기<//>
    </div>
  `;
}
