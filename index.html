// ---------- Firestore storage ----------
// roster/teacherAuth live in one small "meta" doc.
// Each student's own data (logs/homework/feedback/tests/etc, including photos & audio)
// lives in its own doc, so one student's data never affects another's, and we
// stay well clear of Firestore's 1MB-per-document limit as the roster grows.
const META_COLLECTION = "sarahsEnglishMeta";
const META_DOC_ID = "main";
const STUDENTS_COLLECTION = "sarahsEnglishStudents";

let store = null; // in-memory cache: { roster, teacherAuth, studentData }

async function loadStore(attempts = 3) {
  for (let i = 0; i < attempts; i++) {
    try {
      const ref = window.__doc(window.__db, META_COLLECTION, META_DOC_ID);
      const snap = await window.__getDoc(ref);
      const rec = snap.exists() ? snap.data() : {};
      store = {
        roster: Array.isArray(rec.roster) ? rec.roster : [],
        teacherAuth: rec.teacherAuth || null,
        levelTestBookings: Array.isArray(rec.levelTestBookings) ? rec.levelTestBookings : [],
        studentData: {}, // fetched per-student on demand via ensureData()
      };
      return store;
    } catch (e) {
      console.error("loadStore error", e);
      if (i === attempts - 1) throw e;
      await new Promise((r) => setTimeout(r, 500 * (i + 1)));
    }
  }
}

async function saveMeta() {
  try {
    const ref = window.__doc(window.__db, META_COLLECTION, META_DOC_ID);
    await window.__setDoc(ref, { roster: store.roster, teacherAuth: store.teacherAuth, levelTestBookings: store.levelTestBookings || [] });
    return true;
  } catch (e) {
    console.error("saveMeta error", e);
    return false;
  }
}

async function loadStudentDoc(id) {
  try {
    const ref = window.__doc(window.__db, STUDENTS_COLLECTION, id);
    const snap = await window.__getDoc(ref);
    return snap.exists() ? snap.data() : null;
  } catch (e) {
    console.error("loadStudentDoc error", e);
    return null;
  }
}

async function saveStudentDoc(id, data) {
  try {
    const ref = window.__doc(window.__db, STUDENTS_COLLECTION, id);
    await window.__setDoc(ref, data);
    return true;
  } catch (e) {
    console.error("saveStudentDoc error", e);
    return false;
  }
}

const SYNONYM_LOOKUP = {};
SYNONYM_GROUPS.forEach((group) => {
  group.forEach((word) => {
    const key = normText(word);
    if (!SYNONYM_LOOKUP[key]) SYNONYM_LOOKUP[key] = new Set();
    group.forEach((other) => { if (other !== word) SYNONYM_LOOKUP[key].add(normText(other)); });
  });
});
function isKnownSynonym(a, b) {
  const na = normText(a), nb = normText(b);
  if (!na || !nb) return false;
  return (SYNONYM_LOOKUP[na] && SYNONYM_LOOKUP[na].has(nb)) || (SYNONYM_LOOKUP[nb] && SYNONYM_LOOKUP[nb].has(na));
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];

function groupByDate(items, dateField) {
  const map = {};
  items.forEach((it) => {
    const d = it[dateField] || "";

}

function splitFirst(line, delim) {
  const idx = line.indexOf(delim);
  if (idx === -1) return null;
  return [line.slice(0, idx).trim(), line.slice(idx + delim.length).trim()];
}
function parseVocabPaste(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const rows = [];
  for (const line of lines) {
    let pair = splitFirst(line, " - ") || splitFirst(line, "\t") || splitFirst(line, ":") || splitFirst(line, ",");
    if (!pair) {
      const m = line.split(/\s{2,}/);
      if (m.length >= 2) pair = [m[0].trim(), m.slice(1).join(" ").trim()];
    }
    if (pair) {
      const [word, meaning] = pair;
      if (word && meaning) rows.push({ word, meaning });
    }
  }
  return rows;
}
function parseExamPaste(text) {
  const blocks = text.split(/\n\s*\n/).map((b) => b.trim()).filter(Boolean);
  const out = [];
  for (const block of blocks) {
    const lines = block.split("\n").map((l) => l.trim()).filter(Boolean);
    if (lines.length < 3) continue;
    const isMarker = (l) => /^(?:[①②③④⑤]|[1-9][.\)]|[A-Da-d][.\)])\s*/.test(l);
    const isAnswer = (l) => /^정답\s*[:：]?/.test(l);
    const qLines = [];
    let i = 0;
    while (i < lines.length && !isMarker(lines[i]) && !isAnswer(lines[i])) { qLines.push(lines[i]); i++; }
    if (qLines.length === 0) continue;
    qLines[0] = qLines[0].replace(/^\d+[.\)]\s*/, "");
    const qText = qLines.join("\n");
    const choices = [];
    let answerIdx = 0;
    for (; i < lines.length; i++) {
      const line = lines[i];
      const ansMatch = line.match(/^정답\s*[:：]?\s*([1-9A-Da-d])/);
      if (ansMatch) {
        const a = ansMatch[1];
        answerIdx = /[1-9]/.test(a) ? parseInt(a, 10) - 1 : a.toUpperCase().charCodeAt(0) - 65;
        continue;
      }
      const marker = line.match(/^(?:[①②③④⑤]|[1-9][.\)]|[A-Da-d][.\)])\s*/);
      if (marker) choices.push(line.slice(marker[0].length).trim());
      else if (choices.length > 0) choices[choices.length - 1] += " " + line;
    }
    if (qText && choices.length >= 2) out.push({ q: qText, choices, answer: Math.min(Math.max(answerIdx, 0), choices.length - 1) });
  }
  return out;
}
function normText(s) { return (s || "").replace(/\s+/g, "").toLowerCase(); }
function checkVocabAnswer(userAnswer, correctMeaning, synonyms) {
  const norm = normText(userAnswer);
  if (!norm) return false;
  const segments = correctMeaning.split(/[,;/·]|\(|\)|\[|\]/).map((s) => normText(s)).filter(Boolean);
  const extra = (synonyms || []).map((s) => normText(s)).filter(Boolean);
  return [...segments, ...extra].some((seg) => seg === norm || (seg.length >= 2 && norm.length >= 2 && (seg.includes(norm) || norm.includes(seg))));
}
async function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- Root ----------
function App() {
  const [screen, setScreen] = useState("home");
  const [roster, setRoster] = useState(null);
  const [teacherAuth, setTeacherAuth] = useState(null);
  const [levelTestBookings, setLevelTestBookings] = useState([]);
  const [session, setSession] = useState(null);
  const [dataCache, setDataCache] = useState({});
  const [selectedStudentId, setSelectedStudentId] = useState(null);
  const [err, setErr] = useState("");
  const [loadError, setLoadError] = useState(false);
  const [loadTick, setLoadTick] = useState(0);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoadError(false);
      try {
        const s = await loadStore();
        if (cancelled) return;
        setRoster(s.roster);
        setTeacherAuth(s.teacherAuth);
        setLevelTestBookings(s.levelTestBookings || []);
      } catch (e) {
        if (!cancelled) setLoadError(true);
      }
    })();
    return () => { cancelled = true; };
  }, [loadTick]);

  async function saveBookingsList(list) {
    setLevelTestBookings(list);
    if (store) store.levelTestBookings = list;
    await saveMeta();
  }
  async function addBooking(b) {
    const next = [{ id: uid(), status: "대기", createdAt: today(), ...b }, ...levelTestBookings];
    await saveBookingsList(next);
  }

  async function ensureData(id) {
    const remote = await loadStudentDoc(id);
    const d = remote || dataCache[id] || emptyData();
    setDataCache((prev) => ({ ...prev, [id]: d }));
    if (store) store.studentData[id] = d;
    return d;
  }
  async function updateData(id, updater) {
    // Use a Firestore transaction so the read-modify-write is atomic on the server.
    // This is what actually prevents data loss from rapid or overlapping edits (e.g. two
    // photos taken back to back, or the teacher and a student editing at the same moment) —
    // a client-side cache or same-tab queue can't protect against a second browser tab/device
    // writing in between, but a transaction does.
    const ref = window.__doc(window.__db, STUDENTS_COLLECTION, id);
    let next;
    await window.__runTransaction(window.__db, async (tx) => {
      const snap = await tx.get(ref);
      const cur = snap.exists() ? snap.data() : (dataCache[id] || emptyData());
      next = updater(cur);
      tx.set(ref, next);
    });
    setDataCache((prev) => ({ ...prev, [id]: next }));
    if (store) store.studentData[id] = next;
    return next;
  }
  async function saveRosterList(list) {
    setRoster(list);
    if (store) store.roster = list;
    await saveMeta();
  }
  async function saveTeacherAuthGlobal(ta) {
    setTeacherAuth(ta);
    if (store) store.teacherAuth = ta;
    await saveMeta();
  }

  function logout() {
    setSession(null); setSelectedStudentId(null); setErr(""); setScreen("home");
  }

  if (loadError) {
    return html`
      <div style=${{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: C.slate, gap: 14, padding: 20, textAlign: "center" }}>
        <div style=${{ fontSize: 15, color: C.navy, fontWeight: 700 }}>데이터를 불러오지 못했어요</div>
        <div style=${{ fontSize: 13 }}>네트워크 상태를 확인하고 다시 시도해 주세요. (안전을 위해, 불러오기 전에는 아무 것도 저장하지 않아요)</div>
        <${Button} variant="gold" onClick=${() => setLoadTick((n) => n + 1)}>다시 시도<//>
      </div>
    `;
  }

  if (roster === null) {
    return html`<div style=${{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.slate }}>불러오는 중...</div>`;
  }

  const isWide = screen === "home" || screen === "teacherDash";
  return html`
    <div style=${{ minHeight: "100vh", background: C.ivory }}>
      ${screen !== "home" && html`<${TopBar} tagline=${screen === "teacherDash" ? "Teacher Console" : screen === "studentDash" ? "Student Portal" : screen === "parentDash" ? "Parent Portal" : "learning, tracked with care"} />`}
      <div style=${{ maxWidth: isWide ? 1080 : 480, margin: "0 auto", padding: screen === "home" ? "0 0 60px" : isWide ? "18px 16px 60px" : "18px 16px 60px" }}>
        ${screen === "home" && html`<${HomePage} setScreen=${setScreen} />`}
        ${screen === "levelTest" && html`<${LevelTestBooking} onBack=${() => setScreen("home")} onSubmit=${async (b) => { await addBooking(b); }} />`}
        ${screen === "role" && html`<${RoleSelect} setScreen=${setScreen} />`}
        ${screen === "teacherLogin" && html`<${TeacherLogin} teacherAuth=${teacherAuth} onBack=${() => setScreen("role")}
          onSetPass=${async (p) => { const ta = { passcode: p }; await saveTeacherAuthGlobal(ta); setSession({ role: "teacher" }); setScreen("teacherDash"); }}
          onLogin=${(p) => { if (teacherAuth && p === teacherAuth.passcode) { setSession({ role: "teacher" }); setScreen("teacherDash"); } else setErr("비밀번호가 맞지 않아요."); }}
          err=${err} />`}
        ${screen === "studentLogin" && html`<${StudentParentLogin} mode="student" roster=${roster} onBack=${() => setScreen("role")}
          onLogin=${(s) => { setSession({ role: "student", student: s }); setScreen("studentDash"); }} />`}
        ${screen === "parentLogin" && html`<${StudentParentLogin} mode="parent" roster=${roster} onBack=${() => setScreen("role")}
          onLogin=${(s) => { setSession({ role: "parent", student: s }); setScreen("parentDash"); }} />`}
        ${screen === "teacherDash" && html`<${TeacherDash} roster=${roster} saveRosterList=${saveRosterList}
          selectedStudentId=${selectedStudentId} setSelectedStudentId=${setSelectedStudentId}
          ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout}
          levelTestBookings=${levelTestBookings} saveBookingsList=${saveBookingsList} />`}
        ${screen === "studentDash" && html`<${StudentDash} student=${session.student} ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout} />`}
        ${screen === "parentDash" && html`<${ParentDash} student=${session.student} ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout} />`}
      </div>
    </div>
  `;
}

// ---------- Level test booking ----------
function LevelTestBooking({ onBack, onSubmit }) {
  const [name, setName] = useState(""); const [grade, setGrade] = useState("");
  const [phone, setPhone] = useState(""); const [date, setDate] = useState(""); const [time, setTime] = useState("");
  const [note, setNote] = useState("");
  const [done, setDone] = useState(false);
  const [err, setErr] = useState("");

  async function submit() {
    if (!name || !phone || !date) { setErr("이름, 연락처, 희망 날짜는 꼭 입력해 주세요."); return; }
    await onSubmit({ name, grade, phone, date, time, note });
    setDone(true);
  }

  if (done) {
    return html`
      <div style=${{ maxWidth: 440, margin: "60px auto", textAlign: "center", padding: "0 20px" }}>
        <div style=${{ ...serif, fontSize: 20, color: C.navy, marginBottom: 10 }}>예약이 접수됐어요</div>
        <div style=${{ fontSize: 13.5, color: C.slate, marginBottom: 22 }}>확인 후 입력하신 연락처로 연락드릴게요.</div>
        <${Button} variant="ghost" onClick=${onBack}>홈으로 돌아가기<//>
      </div>
    `;
  }

  return html`
    <div style=${{ maxWidth: 440, margin: "0 auto", padding: "24px 20px 60px" }}>
      <${BackBtn} onClick=${onBack} />
      <${SectionLabel} n=${1} label="LEVEL TEST" />
      <${Card}>
        <${Field} label="학생 이름"><input style=${inputStyle} value=${name} onChange=${(e) => setName(e.target.value)} /><//>
        <${Field} label="학년"><input style=${inputStyle} value=${grade} onChange=${(e) => setGrade(e.target.value)} placeholder="예: 중2" /><//>
        <${Field} label="연락처"><input style=${inputStyle} value=${phone} onChange=${(e) => setPhone(e.target.value)} placeholder="학부모님 연락처" /><//>
        <div style=${{ display: "flex", gap: 8 }}>
          <div style=${{ flex: 1 }}><${Field} label="희망 날짜"><input style=${inputStyle} type="date" value=${date} onChange=${(e) => setDate(e.target.value)} /><//></div>
          <div style=${{ flex: 1 }}><${Field} label="희망 시간대"><input style=${inputStyle} value=${time} onChange=${(e) => setTime(e.target.value)} placeholder="예: 오후 4시" /><//></div>
        </div>
        <${Field} label="문의 사항 (선택)"><textarea style=${{ ...inputStyle, minHeight: 70 }} value=${note} onChange=${(e) => setNote(e.target.value)} /><//>

  `;
}

// ---------- Student/Parent login ----------
function StudentParentLogin({ mode, roster, onBack, onLogin }) {
  const [code, setCode] = useState(""); const [err, setErr] = useState("");
  function submit() {
    const trimmed = code.trim();
    if (!trimmed) { setErr("코드를 입력해 주세요."); return; }
    const s = roster.find((r) => (mode === "student" ? r.studentCode : r.parentCode) === trimmed);
    if (!s) { setErr("코드가 맞지 않아요. 선생님께 확인해 주세요."); return; }
    onLogin(s);
  }
  return html`
    <div>
      <${BackBtn} onClick=${onBack} />
      <${SectionLabel} n=${2} label=${mode === "student" ? "STUDENT LOGIN" : "PARENT LOGIN"} />
      ${roster.length === 0 ? html`<${Empty} text="아직 등록된 학생이 없어요. 선생님께 등록을 요청해 주세요." />` : html`
        <${Card}>
          <${Field} label=${mode === "student" ? "학생 코드" : "학부모 코드"}>
            <input style=${inputStyle} value=${code} onChange=${(e) => setCode(e.target.value)}
              onKeyDown=${(e) => e.key === "Enter" && submit()} placeholder="선생님께 받은 코드를 입력하세요" autoFocus />
          <//>
          ${err && html`<div style=${{ color: C.danger, fontSize: 12, marginBottom: 8 }}>${err}</div>`}
          <${Button} variant="gold" onClick=${submit}>접속하기<//>
        <//>
      `}
    </div>
  `;
}

// ---------- Teacher dashboard ----------
function TeacherDash({ roster, saveRosterList, selectedStudentId, setSelectedStudentId, ensureData, updateData, dataCache, onLogout, levelTestBookings, saveBookingsList }) {
  const [section, setSection] = useState("students");
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState(""); const [sc, setSc] = useState(""); const [pc, setPc] = useState("");
  const [addErr, setAddErr] = useState("");
  const [showStatus, setShowStatus] = useState(false);
  const [showBookings, setShowBookings] = useState(false);
  const selected = roster.find((r) => r.id === selectedStudentId);

  useEffect(() => { if (selectedStudentId) ensureData(selectedStudentId); }, [selectedStudentId]);

  async function addStudent() {
    if (!name || !sc || !pc) return;
    const dupe = roster.some((r) => r.studentCode === sc || r.parentCode === sc || r.studentCode === pc || r.parentCode === pc);
    if (dupe) { setAddErr("이미 사용 중인 코드예요. 다른 코드를 입력해 주세요."); return; }
    const s = { id: uid(), name, studentCode: sc, parentCode: pc };
    await saveRosterList([...roster, s]);
    setName(""); setSc(""); setPc(""); setAddErr(""); setShowAdd(false);
  }
  async function removeStudent(id) {
    await saveRosterList(roster.filter((r) => r.id !== id));
    if (selectedStudentId === id) setSelectedStudentId(null);
  }

  const navItems = [
    { key: "students", label: "학생 관리", icon: "🗂" },
    { key: "wordbank", label: "단어 시험지 생성", icon: "🔤" },
    { key: "reports", label: "리포트 작성", icon: "📊" },
  ];
  function goSection(key) {
    setSection(key);
    setSelectedStudentId(null); setShowStatus(false); setShowBookings(false);
  }

  let body;
  if (section === "wordbank") {
    body = html`<${WordbankSection} />`;
  } else if (section === "reports") {
    body = html`<${ReportsSection} roster=${roster} ensureData=${ensureData} dataCache=${dataCache} />`;
  } else if (showStatus) {
    body = html`<${HomeworkStatusOverview} roster=${roster} ensureData=${ensureData} dataCache=${dataCache} onBack=${() => setShowStatus(false)} onLogout=${onLogout} />`;
  } else if (showBookings) {
    body = html`<${LevelTestBookingsOverview} bookings=${levelTestBookings} saveBookingsList=${saveBookingsList} onBack=${() => setShowBookings(false)} onLogout=${onLogout} />`;
  } else if (selected) {
    const data = dataCache[selected.id] || emptyData();
    body = html`<${TeacherStudentPanel} student=${selected} data=${data} onBackToList=${() => setSelectedStudentId(null)}
      updateData=${(updater) => updateData(selected.id, updater)} onLogout=${onLogout} />`;
  } else {
    const pendingCount = (levelTestBookings || []).filter((b) => b.status !== "완료").length;
    body = html`
      <div>
        <${Button} variant="ghost" onClick=${() => setShowBookings(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 8 }}>🗓 레벨테스트 예약 현황${pendingCount > 0 ? ` (대기 ${pendingCount}건)` : ""}<//>
        <${Button} variant="ghost" onClick=${() => setShowStatus(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 12 }}>📋 숙제 현황 한눈에 보기<//>
        ${roster.map((r) => html`
          <${Card} key=${r.id}>
            <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div onClick=${() => setSelectedStudentId(r.id)} style=${{ cursor: "pointer", flex: 1 }}>
                <div style=${{ fontWeight: 700, color: C.navy }}>${r.name}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>학생코드 ${r.studentCode} · 학부모코드 ${r.parentCode}</div>
              </div>
              <button onClick=${() => removeStudent(r.id)} style=${{ background: "none", border: "none", color: C.danger, cursor: "pointer", fontSize: 16 }}>✕</button>
            </div>
          <//>
        `)}
        ${roster.length === 0 && html`<${Empty} text="학생을 추가해 주세요." />`}
        ${!showAdd ? html`
          <${Button} variant="ghost" onClick=${() => setShowAdd(true)} style=${{ width: "100%", justifyContent: "center", marginTop: 6 }}>+ 학생 추가<//>
        ` : html`
          <${Card}>
            <${Field} label="이름"><input style=${inputStyle} value=${name} onChange=${(e) => setName(e.target.value)} /><//>
            <${Field} label="학생 코드 (학생 로그인용)"><input style=${inputStyle} value=${sc} onChange=${(e) => setSc(e.target.value)} /><//>
            <${Field} label="학부모 코드 (학부모 로그인용)"><input style=${inputStyle} value=${pc} onChange=${(e) => setPc(e.target.value)} /><//>
            ${addErr && html`<div style=${{ color: C.danger, fontSize: 12, marginBottom: 8 }}>${addErr}</div>`}
            <div style=${{ display: "flex", gap: 8 }}>
              <${Button} variant="gold" onClick=${addStudent}>저장<//>
              <${Button} variant="ghost" onClick=${() => { setShowAdd(false); setAddErr(""); }}>취소<//>
            </div>
          <//>
        `}
      </div>
    `;
  }

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style=${{ ...serif, fontSize: 18, color: C.navy }}>Teacher Dashboard</div>
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>로그아웃</button>
      </div>
      <${Shell} side=${html`<${SideNav} items=${navItems} active=${section} onChange=${goSection} />`}>${body}<//>
    </div>
  `;
}

function HomeworkStatusOverview({ roster, ensureData, dataCache, onBack, onLogout }) {
  const [loaded, setLoaded] = useState(false);
  const [studentFilter, setStudentFilter] = useState("");

  useEffect(() => {
    let cancelled = false;
    (async () => {
      for (const s of roster) { await ensureData(s.id); if (cancelled) return; }
      if (!cancelled) setLoaded(true);
    })();
    return () => { cancelled = true; };
  }, []);

  const byDate = {};
  roster.forEach((s) => {
    if (studentFilter && s.id !== studentFilter) return;
    const d = dataCache[s.id] || emptyData();
    (d.homework || []).forEach((h) => {
      if (h.done) return; // only show incomplete homework
      const date = h.dueDate || h.assignedDate;
      if (!date) return;
      if (!byDate[date]) byDate[date] = {};
      if (!byDate[date][s.id]) byDate[date][s.id] = { student: s, items: [] };
      byDate[date][s.id].items.push(h);
    });
  });
  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <${BackBtn} onClick=${onBack} />
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>로그아웃</button>
      </div>
      <div style=${{ ...serif, fontSize: 19, color: C.navy, marginBottom: 10 }}>숙제 현황 <span style=${{ fontSize: 12, color: C.slate, fontWeight: 400 }}>(미완료만 표시)</span></div>
      <${Card}>
        <${Field} label="학생 필터">
          <select style=${inputStyle} value=${studentFilter} onChange=${(e) => setStudentFilter(e.target.value)}>
            <option value="">전체 학생</option>
            ${roster.map((s) => html`<option key=${s.id} value=${s.id}>${s.name}</option>`)}
          </select>
        <//>
      <//>

        <div key=${date} style=${{ marginTop: 20 }}>

// ---------- 단어시험 기록 (수기 입력, 자동 합격판정) ----------
function VocabLogEditor({ data, updateData }) {
  const [date, setDate] = useState(today());
  const [book, setBook] = useState(BOOK_LIST[0]);
  const [customBook, setCustomBook] = useState("");
  const [range, setRange] = useState("");
  const [correct, setCorrect] = useState("");
  const [total, setTotal] = useState("");
  const [retest, setRetest] = useState("");

  const isCumulative = range.includes("누적");
  const threshold = isCumulative ? 90 : 80;
  const pct = total ? Math.round((Number(correct) / Number(total)) * 100) : null;
  const allowedWrong = total ? Math.round(Number(total) * (isCumulative ? 0.10 : 0.20)) : null;
  const wrongCount = total && correct !== "" ? Number(total) - Number(correct) : null;
  const willPass = wrongCount !== null ? wrongCount <= allowedWrong : null;
  const effectiveBook = book === "__other__" ? customBook.trim() : book;

  async function add() {
    if (!date || !total || !range || !effectiveBook) return;
    const scorePct = Math.round((Number(correct) / Number(total)) * 100);
    const allowed = Math.round(Number(total) * (range.includes("누적") ? 0.10 : 0.20));
    const passed = (Number(total) - Number(correct)) <= allowed;
    await updateData((d) => ({
      ...d,
      vocabLog: [{ id: uid(), date, book: effectiveBook, range, correct: Number(correct), total: Number(total), score: scorePct, passed, retest }, ...(d.vocabLog || [])],
    }));
    setRange(""); setCorrect(""); setTotal(""); setRetest("");
  }
  async function remove(id) { await updateData((d) => ({ ...d, vocabLog: (d.vocabLog || []).filter((v) => v.id !== id) })); }

  const list = data.vocabLog || [];
  return html`
    <div>
      <div style=${{ fontSize: 12, color: C.slate, marginBottom: 10 }}>단어 시험을 직접 보고 채점한 결과를 기록하세요. 범위에 "누적"이 들어가면 90%(오답 10% 이내), 아니면 80%(오답 20% 이내) 기준으로 자동 합격 판정돼요. 문항 수에 맞춰 반올림한 허용 오답 개수를 기준으로 판정합니다.</div>
      <${Card}>
        <${Field} label="날짜"><input style=${inputStyle} type="date" value=${date} onChange=${(e) => setDate(e.target.value)} /><//>
        <${Field} label="교재">
          <select style=${inputStyle} value=${book} onChange=${(e) => setBook(e.target.value)}>
            ${BOOK_LIST.map((b) => html`<option key=${b} value=${b}>${b}</option>`)}
            <option value="__other__">기타 (직접 입력)</option>
          </select>
        <//>
        ${book === "__other__" && html`<${Field} label="교재명 직접 입력"><input style=${inputStyle} value=${customBook} onChange=${(e) => setCustomBook(e.target.value)} placeholder="교재 이름 입력" /><//>`}
        <${Field} label="시험범위"><input style=${inputStyle} value=${range} onChange=${(e) => setRange(e.target.value)} placeholder="예: Day 1-9 누적" /><//>
        <div style=${{ display: "flex", gap: 8 }}>
          <div style=${{ flex: 1 }}><${Field} label="맞은 개수"><input style=${inputStyle} type="number" value=${correct} onChange=${(e) => setCorrect(e.target.value)} /><//></div>
          <div style=${{ flex: 1 }}><${Field} label="총 문항"><input style=${inputStyle} type="number" value=${total} onChange=${(e) => setTotal(e.target.value)} /><//></div>
        </div>
        ${pct !== null && html`<div style=${{ fontSize: 12.5, marginBottom: 10, color: willPass ? C.navy : C.danger, fontWeight: 700 }}>${pct}% (오답 ${wrongCount}개) · ${total}문항 중 오답 ${allowedWrong}개까지 허용 → ${willPass ? "합격" : "불합격"}</div>`}
        <${Field} label="재시험 메모 (선택)"><input style=${inputStyle} value=${retest} onChange=${(e) => setRetest(e.target.value)} placeholder="예: 7/20 10시" /><//>
        <${Button} variant="gold" onClick=${add}>기록 추가<//>
      <//>
      ${list.length === 0 && html`<${Empty} text="아직 기록이 없어요." />`}
      ${list.map((v) => html`
        <${Card} key=${v.id}>
          <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>${fmtDate(v.date)} · ${v.book}</div>
              <div style=${{ fontSize: 13, marginTop: 4 }}>${v.range} — ${v.correct}/${v.total} (${v.score}%)</div>
              ${v.retest && html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 2 }}>재시험: ${v.retest}</div>`}
            </div>
            <div style=${{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style=${{ fontSize: 11.5, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: v.passed ? "#E9F1EA" : "#F7E9E6", color: v.passed ? "#3D6B4F" : C.danger }}>${v.passed ? "합격" : "불합격"}</span>
              <button onClick=${() => remove(v.id)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>
            </div>
          </div>
        <//>
      `)}
    </div>
  `;
}

function DailyReportGenerator({ student, data }) {
  const [date, setDate] = useState(today());
  const [hwFrom, setHwFrom] = useState(today());
  const [copied, setCopied] = useState(false);
  const [text, setText] = useState("");

  useEffect(() => {
    const dt = new Date(date + "T00:00:00");
    const days = ["일", "월", "화", "수", "목", "금", "토"];
    const md = `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;

    const logsToday = (data.logs || []).filter((l) => l.date === date);
    const learnedBlock = logsToday.length > 0 ? logsToday.map((l) => l.content).join("\n") : "문법:\n독해:";

    const vocabToday = (data.vocabLog || []).filter((v) => v.date === date);
    const vocabBlock = vocabToday.length > 0
      ? vocabToday.map((v) => `${v.book} ${v.range}: ${v.correct}/${v.total} (${v.score}%) - ${v.passed ? "합격" : "불합격"}`).join("\n")
      : "기록 없음";

    const yesterday = new Date(dt); yesterday.setDate(yesterday.getDate() - 1);
    const y = yesterday.getFullYear(), m2 = String(yesterday.getMonth() + 1).padStart(2, "0"), d2 = String(yesterday.getDate()).padStart(2, "0");
    const yesterdayStr = `${y}-${m2}-${d2}`;
    const fromD = hwFrom && hwFrom <= yesterdayStr ? hwFrom : yesterdayStr;
    const inRange = (d) => d && d >= fromD && d <= yesterdayStr;
    const hwRange = (data.homework || []).filter((h) => inRange(h.dueDate));
    const hwBlock = hwRange.length > 0
      ? hwRange.map((h) => `${h.content} → ${h.done ? "완료" : "미완료"}`).join("\n")
      : "기록 없음";

    const msg = `[${student.name}] ${md} 수업 안내\n📖 오늘 배운 내용\n${learnedBlock}\n✏️ 단어시험 결과\n${vocabBlock}\n📝 숙제 확인\n${hwBlock}`;
    setText(msg);
    setCopied(false);
  }, [student.id, date, hwFrom, data]);

  async function copy() {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch (e) {
      setCopied(false);
    }
  }

  return html`
    <div>
      <${Card}>
        <${Field} label="수업 날짜"><input style=${inputStyle} type="date" value=${date} onChange=${(e) => setDate(e.target.value)} /><//>
        <${Field} label="숙제 확인 시작일 (직전 수업 다음날)"><input style=${inputStyle} type="date" value=${hwFrom} onChange=${(e) => setHwFrom(e.target.value)} /><//>
        <div style=${{ fontSize: 11.5, color: C.slate }}>시작일부터 어제까지, "제출 기한"이 그 사이인 숙제만 담겨요. 오늘 수업에서 새로 내준 숙제는 다음 리포트에 들어갑니다.</div>
      <//>
      <${Card}>
        <textarea style=${{ ...inputStyle, minHeight: 220, fontFamily: "inherit", lineHeight: 1.7, whiteSpace: "pre-wrap" }} value=${text} onChange=${(e) => setText(e.target.value)} />
        <div style=${{ display: "flex", alignItems: "center", gap: 10, marginTop: 10 }}>
          <${Button} variant="gold" onClick=${copy}>복사하기<//>
          ${copied && html`<span style=${{ fontSize: 12, color: C.navy }}>복사됐어요 — 문자로 붙여넣으세요.</span>`}
        </div>
      <//>
    </div>
  `;
}

function VocabResultRow({ r, updateData }) {
  const [open, setOpen] = useState(false);
  const pct = Math.round((r.score / r.total) * 100);
  const ok = pct >= 90;
  const hasBreakdown = Array.isArray(r.breakdown) && r.breakdown.length > 0;

  async function markCorrect(idx) {
    await updateData((d) => ({
      ...d,
      vocabResults: d.vocabResults.map((x) => {
        if (x.id !== r.id) return x;
        const breakdown = x.breakdown.map((row, i) => (i === idx ? { ...row, ok: true, manualOverride: true } : row));
        const score = breakdown.filter((row) => row.ok).length;
        return { ...x, breakdown, score };
      }),
    }));
  }

  return html`
    <div style=${{ marginBottom: 6, paddingBottom: 6, borderBottom: `1px solid ${C.line}` }}>
      <div style=${{ fontSize: 12.5, display: "flex", alignItems: "center", gap: 8, cursor: hasBreakdown ? "pointer" : "default" }} onClick=${() => hasBreakdown && setOpen((o) => !o)}>
        <span>${fmtDate(r.date)} 응시 — <b>${r.score}</b> / ${r.total} (${pct}%)</span>
        <span style=${{ fontSize: 10.5, fontWeight: 700, padding: "1px 7px", borderRadius: 20, background: ok ? "#E9F1EA" : "#F7E9E6", color: ok ? "#3D6B4F" : C.danger }}>${ok ? "합격" : "재시험 필요"}</span>
        ${hasBreakdown && html`<span style=${{ fontSize: 11, color: C.slate, marginLeft: "auto" }}>${open ? "▲ 답안 닫기" : "▼ 답안 보기"}</span>`}
      </div>
      ${open && hasBreakdown && html`
        <div style=${{ marginTop: 8, background: C.ivory, border: `1px solid ${C.line}`, borderRadius: 4, padding: 10 }}>
          ${r.breakdown.map((row, i) => html`
            <div key=${i} style=${{ padding: "6px 0", borderBottom: i < r.breakdown.length - 1 ? `1px dotted ${C.line}` : "none" }}>
              <div style=${{ fontSize: 12, fontWeight: 700, color: C.navy, whiteSpace: "pre-wrap" }}>${i + 1}. ${row.prompt}</div>
              <div style=${{ fontSize: 12, marginTop: 2, color: row.ok ? C.navy : C.danger }}>학생 답: ${row.given} ${row.ok ? "✓" : "✗"}${row.manualOverride ? " (선생님 확인 정답 처리)" : ""}</div>
              ${!row.ok && html`
                <div style=${{ display: "flex", alignItems: "center", gap: 8, marginTop: 3 }}>
                  <div style=${{ fontSize: 11.5, color: C.slate }}>정답: ${row.correct}</div>
                  <button onClick=${() => markCorrect(i)} style=${{ fontSize: 11, padding: "3px 9px", borderRadius: 20, border: `1px solid ${C.gold}`, background: "none", color: C.gold, cursor: "pointer" }}>맞는 걸로 처리</button>
                </div>
              `}
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

function VocabEditor({ data, updateData }) {
  const [creating, setCreating] = useState(false); const [title, setTitle] = useState("");
  const [words, setWords] = useState([{ word: "", meaning: "" }]);
  const [showPaste, setShowPaste] = useState(false); const [pasteText, setPasteText] = useState(""); const [pasteMsg, setPasteMsg] = useState("");
  const [showBank, setShowBank] = useState(false); const [bankBooks, setBankBooks] = useState(null);
  const [bankBookId, setBankBookId] = useState(""); const [bankFrom, setBankFrom] = useState(1); const [bankTo, setBankTo] = useState(1);
  const [bankCount, setBankCount] = useState("");
  const [bankMsg, setBankMsg] = useState("");

  function runParse() {
    const parsed = parseVocabPaste(pasteText);
    if (parsed.length === 0) { setPasteMsg("인식된 단어가 없어요. 형식을 확인해 주세요."); return; }
    setWords(parsed); setPasteMsg(`${parsed.length}개 단어를 불러왔어요. 아래에서 확인 후 저장하세요.`); setShowPaste(false); setPasteText("");
  }
  async function openBank() {
    setShowBank(true);
    if (bankBooks === null) {
      try {
        const ref = window.__doc(window.__db, "sarahsEnglishWordbank", "main");
        const snap = await window.__getDoc(ref);
        const rec = snap.exists() ? snap.data() : {};
        const books = Array.isArray(rec.books) ? rec.books : [];
        setBankBooks(books);
        if (books[0]) { setBankBookId(books[0].id); setBankTo(books[0].totalDays || 1); }
        if (books.length === 0) setBankMsg("워드뱅크에 등록된 교재가 없어요. 먼저 '단어 시험지 생성' 메뉴에서 교재와 단어를 등록해 주세요.");
      } catch (e) { setBankBooks([]); setBankMsg("워드뱅크를 불러오지 못했어요."); }
    }
  }
  function importFromBank() {
    const book = (bankBooks || []).find((b) => b.id === bankBookId);
    if (!book) return;
    const from = Math.max(1, Number(bankFrom) || 1);
    const to = Math.max(from, Math.min(book.totalDays || from, Number(bankTo) || from));
    let picked = [];
    for (let d = from; d <= to; d++) {
      const arr = (book.days || {})["day" + d] || [];
      picked = picked.concat(arr.map((w) => ({ word: w.en, meaning: w.ko })));
    }
    if (picked.length === 0) { setBankMsg("해당 범위에 저장된 단어가 없어요."); return; }
    const n = Number(bankCount);
    if (n > 0 && n < picked.length) picked = shuffle(picked).slice(0, n);
    setWords(picked);
    setTitle((t) => t || `${book.name} Day ${from}-${to}`);
    setBankMsg(`${picked.length}개 단어를 불러왔어요. 아래에서 확인 후 저장하세요.`);
    setShowBank(false);
  }
  function setRow(i, key, val) { setWords((w) => w.map((row, idx) => (idx === i ? { ...row, [key]: val } : row))); }
  function addRow() { setWords((w) => [...w, { word: "", meaning: "" }]); }
  function removeRow(i) { setWords((w) => w.filter((_, idx) => idx !== i)); }
  async function save() {
    const clean = words.filter((w) => w.word && w.meaning).map((w) => ({
      word: w.word, meaning: w.meaning,
      synonyms: (w.synonyms || "").split(",").map((s) => s.trim()).filter(Boolean),
    }));
    if (!title || clean.length < 2) return;
    await updateData((d) => ({ ...d, vocabTests: [{ id: uid(), title, date: today(), words: clean }, ...d.vocabTests] }));
    setTitle(""); setWords([{ word: "", meaning: "" }]); setCreating(false);
  }
  async function removeTest(id) { await updateData((d) => ({ ...d, vocabTests: d.vocabTests.filter((t) => t.id !== id) })); }

  return html`
    <div>
      ${!creating ? html`
        <${Button} variant="ghost" onClick=${() => setCreating(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 12 }}>+ 새 단어 재시험 만들기<//>
      ` : html`
        <${Card}>
          <${Field} label="재시험 이름"><input style=${inputStyle} value=${title} onChange=${(e) => setTitle(e.target.value)} placeholder="예: Unit 5 단어 재시험" /><//>
          <div style=${{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <${Button} variant="ghost" onClick=${() => setShowPaste(true)} style=${{ marginBottom: 12 }}>붙여넣기로 한번에 가져오기<//>
            <${Button} variant="ghost" onClick=${openBank} style=${{ marginBottom: 12 }}>📚 워드뱅크에서 가져오기<//>
          </div>
          ${showPaste && html`
            <${Card} style=${{ background: C.ivory }}>
              <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6 }}>한 줄에 단어 하나씩, "단어 - 뜻" 형식으로 붙여넣어 주세요. 뜻이 여러 개면 콤마(,)나 세미콜론(;)으로 이어서 써도 돼요.</div>
              <textarea style=${{ ...inputStyle, minHeight: 110, fontFamily: "monospace", fontSize: 12.5 }} placeholder=${"apple - 사과\nhesitate - 주저하다, 망설이다"} value=${pasteText} onChange=${(e) => setPasteText(e.target.value)} />
              <div style=${{ display: "flex", gap: 8, marginTop: 8 }}>
                <${Button} variant="gold" onClick=${runParse}>가져오기<//>
                <${Button} variant="ghost" onClick=${() => setShowPaste(false)}>취소<//>
              </div>
            <//>
          `}
          ${showBank && html`
            <${Card} style=${{ background: C.ivory }}>
              ${bankBooks === null ? html`<div style=${{ fontSize: 12.5, color: C.slate }}>불러오는 중...</div>` : bankBooks.length === 0 ? html`<div style=${{ fontSize: 12.5, color: C.slate }}>${bankMsg}</div>` : html`
                <${Field} label="교재">
                  <select style=${inputStyle} value=${bankBookId} onChange=${(e) => { setBankBookId(e.target.value); const b = bankBooks.find((x) => x.id === e.target.value); setBankFrom(1); setBankTo(b ? b.totalDays : 1); }}>
                    ${bankBooks.map((b) => html`<option key=${b.id} value=${b.id}>${b.name}</option>`)}
                  </select>
                <//>
                <div style=${{ display: "flex", gap: 8 }}>
                  <div style=${{ flex: 1 }}><${Field} label="시작 Day"><input style=${inputStyle} type="number" min="1" value=${bankFrom} onChange=${(e) => setBankFrom(e.target.value)} /><//></div>
                  <div style=${{ flex: 1 }}><${Field} label="끝 Day"><input style=${inputStyle} type="number" min="1" value=${bankTo} onChange=${(e) => setBankTo(e.target.value)} /><//></div>
                </div>
                <${Field} label="출제 문항 수 (비워두면 범위의 전체 단어)"><input style=${inputStyle} type="number" min="1" value=${bankCount} onChange=${(e) => setBankCount(e.target.value)} placeholder="예: 20" /><//>
                <div style=${{ display: "flex", gap: 8, marginTop: 4 }}>
                  <${Button} variant="gold" onClick=${importFromBank}>이 범위로 가져오기<//>
                  <${Button} variant="ghost" onClick=${() => setShowBank(false)}>취소<//>
                </div>
              `}
            <//>
          `}
          ${pasteMsg && html`<div style=${{ fontSize: 12, color: C.navy, marginBottom: 10 }}>${pasteMsg}</div>`}
          ${bankMsg && bankBooks && bankBooks.length > 0 && html`<div style=${{ fontSize: 12, color: C.navy, marginBottom: 10 }}>${bankMsg}</div>`}
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6, fontWeight: 600 }}>단어 목록 (최소 2개, 직접 입력 방식으로 출제됩니다)</div>
          ${words.map((w, i) => html`
            <div key=${i} style=${{ marginBottom: 10, paddingBottom: 10, borderBottom: `1px solid ${C.line}` }}>
              <div style=${{ display: "flex", gap: 6, alignItems: "center" }}>

function ExamEditor({ data, updateData }) {
  const [creating, setCreating] = useState(false); const [title, setTitle] = useState("");
  const [questions, setQuestions] = useState([{ q: "", choices: ["", ""], answer: 0 }]);
  const [showPaste, setShowPaste] = useState(false); const [pasteText, setPasteText] = useState(""); const [pasteMsg, setPasteMsg] = useState("");

  function runParse() {
    const parsed = parseExamPaste(pasteText);
    if (parsed.length === 0) { setPasteMsg("인식된 문제가 없어요. 형식을 확인해 주세요."); return; }
    setQuestions(parsed); setPasteMsg(`${parsed.length}개 문제를 불러왔어요. 아래에서 확인 후 저장하세요.`); setShowPaste(false); setPasteText("");
  }
  function setQ(i, val) { setQuestions((qs) => qs.map((row, idx) => (idx === i ? { ...row, q: val } : row))); }
  function setChoice(qi, ci, val) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: row.choices.map((c, cidx) => (cidx === ci ? val : c)) } : row))); }
  function setAnswer(qi, ci) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, answer: ci } : row))); }
  function addChoice(qi) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: [...row.choices, ""] } : row))); }
  function removeChoice(qi, ci) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: row.choices.filter((_, cidx) => cidx !== ci), answer: row.answer === ci ? 0 : row.answer > ci ? row.answer - 1 : row.answer } : row))); }
  function addQuestion() { setQuestions((qs) => [...qs, { q: "", choices: ["", ""], answer: 0 }]); }
  function removeQuestion(i) { setQuestions((qs) => qs.filter((_, idx) => idx !== i)); }
  async function save() {
    const clean = questions.filter((q) => q.q && q.choices.every((c) => c) && q.choices.length >= 2);
    if (!title || clean.length === 0) return;
    await updateData((d) => ({ ...d, examTests: [{ id: uid(), title, date: today(), questions: clean }, ...d.examTests] }));
    setTitle(""); setQuestions([{ q: "", choices: ["", ""], answer: 0 }]); setCreating(false);
  }
  async function removeTest(id) { await updateData((d) => ({ ...d, examTests: d.examTests.filter((t) => t.id !== id) })); }

  return html`
    <div>
      ${!creating ? html`
        <${Button} variant="ghost" onClick=${() => setCreating(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 12 }}>+ 새 추가 시험 만들기<//>
      ` : html`
        <${Card}>
          <${Field} label="시험 이름"><input style=${inputStyle} value=${title} onChange=${(e) => setTitle(e.target.value)} placeholder="예: 관계대명사 추가 문제" /><//>
          ${!showPaste ? html`
            <${Button} variant="ghost" onClick=${() => setShowPaste(true)} style=${{ marginBottom: 12 }}>붙여넣기로 한번에 가져오기<//>
          ` : html`
            <${Card} style=${{ background: C.ivory }}>
              <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6 }}>문제 사이는 빈 줄로 구분해 주세요.</div>
              <textarea style=${{ ...inputStyle, minHeight: 160, fontFamily: "monospace", fontSize: 12, whiteSpace: "pre" }}
                placeholder=${"1. 다음 중 관계대명사가 알맞은 것은?\n1) who\n2) which\n3) that\n4) whose\n정답: 1"}
                value=${pasteText} onChange=${(e) => setPasteText(e.target.value)} />
              <div style=${{ display: "flex", gap: 8, marginTop: 8 }}>
                <${Button} variant="gold" onClick=${runParse}>가져오기<//>
                <${Button} variant="ghost" onClick=${() => setShowPaste(false)}>취소<//>
              </div>
            <//>
          `}
          ${pasteMsg && html`<div style=${{ fontSize: 12, color: C.navy, marginBottom: 10 }}>${pasteMsg}</div>`}
          ${questions.map((q, qi) => html`
            <div key=${qi} style=${{ border: `1px solid ${C.line}`, borderRadius: 4, padding: 10, marginBottom: 10 }}>
              <div style=${{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <div style=${{ fontSize: 12, color: C.gold, fontWeight: 700 }}>문제 ${qi + 1}</div>
                ${questions.length > 1 && html`<button onClick=${() => removeQuestion(qi)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>`}
              </div>
              <textarea style=${{ ...inputStyle, minHeight: 50, marginBottom: 8 }} placeholder="문제 내용" value=${q.q} onChange=${(e) => setQ(qi, e.target.value)} />
              ${q.choices.map((c, ci) => html`
                <div key=${ci} style=${{ display: "flex", gap: 6, alignItems: "center", marginBottom: 5 }}>
                  <input type="radio" checked=${q.answer === ci} onChange=${() => setAnswer(qi, ci)} />
                  <input style=${{ ...inputStyle, flex: 1 }} placeholder=${`보기 ${ci + 1}`} value=${c} onChange=${(e) => setChoice(qi, ci, e.target.value)} />
                  ${q.choices.length > 2 && html`<button onClick=${() => removeChoice(qi, ci)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>`}
                </div>
              `)}
              <button onClick=${() => addChoice(qi)} style=${{ background: "none", border: "none", color: C.navy, fontSize: 12, cursor: "pointer", padding: 0, marginTop: 4 }}>+ 보기 추가</button>
              <div style=${{ fontSize: 11, color: C.slate, marginTop: 4 }}>라디오 버튼으로 정답을 표시하세요.</div>
            </div>
          `)}
          <${Button} variant="ghost" onClick=${addQuestion} style=${{ marginBottom: 12 }}>+ 문제 추가<//>
          <div style=${{ display: "flex", gap: 8 }}>
            <${Button} variant="gold" onClick=${save}>저장<//>
            <${Button} variant="ghost" onClick=${() => setCreating(false)}>취소<//>
          </div>
        <//>
      `}
      <${SectionLabel} n=${2} label="등록된 시험" />
      ${data.examTests.length === 0 && html`<${Empty} text="아직 만든 시험이 없어요." />`}
      ${data.examTests.map((t) => {
        const results = data.examResults.filter((r) => r.testId === t.id);
        return html`
          <${Card} key=${t.id}>
            <div style=${{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style=${{ fontWeight: 700, color: C.navy }}>${t.title}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>${fmtDate(t.date)} · 문제 ${t.questions.length}개</div>
              </div>
              <button onClick=${() => removeTest(t.id)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>✕</button>
            </div>
            ${results.length === 0 ? html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 8 }}>아직 응시하지 않았어요.</div>` : html`
              <div style=${{ marginTop: 8, borderTop: `1px solid ${C.line}`, paddingTop: 8 }}>
                ${results.map((r) => html`<div key=${r.id} style=${{ fontSize: 12.5, marginBottom: 3 }}>${fmtDate(r.date)} 응시 — <b>${r.score}</b> / ${r.total}</div>`)}
              </div>
            `}
          <//>
        `;
      })}
    </div>
  `;
}

function MockExamTaker({ test, onExit, onSubmit }) {
  const total = test.answerKey.length;
  const [answers, setAnswers] = useState(Array(total).fill(""));
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [wrong, setWrong] = useState([]);

  function pick(i, val) { if (submitted) return; setAnswers((a) => a.map((v, idx) => (idx === i ? val : v))); }

  function submit() {
    let score = 0; const wrongNums = [];
    test.answerKey.forEach((correct, i) => {
      if (normText(answers[i]) === normText(correct) && normText(answers[i]).length > 0) score++;
      else wrongNums.push(i + 1);
    });
    setResult(score); setWrong(wrongNums); setSubmitted(true);
  }

  if (submitted) {
    return html`
      <div>
        <${Card} style=${{ textAlign: "center", padding: 28 }}>
          <div style=${{ ...serif, fontSize: 20, color: C.navy, marginBottom: 8 }}>${test.title}</div>
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 16 }}>채점 결과</div>
          <div style=${{ fontSize: 34, ...serif, color: C.gold }}>${result} <span style=${{ fontSize: 18, color: C.slate }}>/ ${total}</span></div>
          ${wrong.length > 0 && html`<div style=${{ fontSize: 13, color: C.danger, marginTop: 10 }}>틀린 문제: ${wrong.join(", ")}번</div>`}
        <//>
        <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} onClick=${() => onSubmit(result, total, wrong)}>결과 저장하고 나가기<//>
      </div>
    `;
  }

  return html`
    <div>
      <${BackBtn} onClick=${onExit} />
      <div style=${{ ...serif, fontSize: 18, color: C.navy, marginBottom: 2 }}>${test.title}</div>
      ${test.pageRange && html`<div style=${{ fontSize: 12.5, color: C.slate, marginBottom: 12 }}>${test.pageRange}</div>`}
      <${Card}>
        <div style=${{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          ${test.answerKey.map((_, i) => html`
            <div key=${i} style=${{ width: 62 }}>
              <div style=${{ fontSize: 11, color: C.gold, fontWeight: 700, marginBottom: 3, textAlign: "center" }}>${i + 1}</div>
              <input style=${{ ...inputStyle, padding: "8px 6px", textAlign: "center" }} inputMode="numeric" pattern="[0-9]*" value=${answers[i]} onChange=${(e) => pick(i, e.target.value.replace(/[^0-9]/g, ""))} />
            </div>
          `)}
        </div>
      <//>
      <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} disabled=${answers.some((a) => !a.trim())} onClick=${submit}>제출하기<//>
    </div>
  `;
}

// ---------- Student dashboard ----------
function StudentDash({ student, ensureData, updateData, dataCache, onLogout }) {
  const [tab, setTab] = useState("logs");
  const [data, setData] = useState(null);
  const [activeTest, setActiveTest] = useState(null);
  const [activeMock, setActiveMock] = useState(null);

  useEffect(() => { (async () => { const d = await ensureData(student.id); setData(d); })(); }, [student.id]);
  useEffect(() => { if (dataCache[student.id]) setData(dataCache[student.id]); }, [dataCache, student.id]);

  const tabs = [
    { key: "byDate", label: "날짜별 보기", icon: "📅" },
    { key: "logs", label: "오늘의 학습", icon: "📘" },
    { key: "homework", label: "숙제", icon: "📝" },
    { key: "vocab", label: "단어 재시험", icon: "🔤" },
    { key: "exam", label: "추가 시험", icon: "🗒" },
    { key: "mock", label: "모의고사", icon: "📄" },
  ];

  if (!data) return html`<${Empty} text="불러오는 중..." />`;

  if (activeMock) {
    return html`<${MockExamTaker} test=${activeMock} onExit=${() => setActiveMock(null)}
      onSubmit=${async (score, total, wrong) => {
        try {
          await updateData(student.id, (d) => ({ ...d, mockExamResults: [{ id: uid(), testId: activeMock.id, date: today(), score, total, wrong }, ...(d.mockExamResults || [])] }));
        } catch (e) {
          console.error("결과 저장 실패", e);
          alert(friendlyErrorMessage(e));
        }
        setActiveMock(null);
      }} />`;
  }

  if (activeTest) {
    return html`<${TestTaker} activeTest=${activeTest} onExit=${() => setActiveTest(null)}
      onSubmit=${async (score, total, breakdown) => {
        try {
          if (activeTest.type === "vocab") await updateData(student.id, (d) => ({ ...d, vocabResults: [{ id: uid(), testId: activeTest.test.id, date: today(), score, total, breakdown }, ...d.vocabResults] }));
          else await updateData(student.id, (d) => ({ ...d, examResults: [{ id: uid(), testId: activeTest.test.id, date: today(), score, total, breakdown }, ...d.examResults] }));
        } catch (e) {
          console.error("결과 저장 실패", e);
          alert(friendlyErrorMessage(e));
        }
        setActiveTest(null);
      }} />`;
  }

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style=${{ ...serif, fontSize: 19, color: C.navy }}>${student.name} 학생</div>
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>로그아웃</button>
      </div>
      <${Tabs} tabs=${tabs} active=${tab} onChange=${setTab} />

function HomeworkStudentCard({ h, studentId, updateData }) {
  const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const inputId = `hwphoto-${h.id}`;
  const photos = h.photos || (h.photo ? [h.photo] : []);

  async function handleFile(e) {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (files.length === 0) return;
    setErr(""); setBusy(true);
    try {
      const newOnes = [];
      let runningTotal = photos.reduce((sum, p) => sum + p.length, 0);
      const BUDGET = 650000; // leaves headroom under Firestore's 1MB-per-document cap for this student's other data
      for (const file of files) {
        const dataUrl = await compressImage(file, 700, 0.55);
        if (dataUrl.length > 250000) { setErr("사진 한 장의 용량이 너무 커서 건너뛰었어요."); continue; }
        if (runningTotal + dataUrl.length > BUDGET) { setErr("사진을 더 담기엔 용량이 부족해요. 몇 장을 지우고 다시 추가해 주세요."); break; }
        runningTotal += dataUrl.length;
        newOnes.push(dataUrl);
      }
      if (newOnes.length > 0) {
        await updateData(studentId, (d) => ({
          ...d,
          homework: (d.homework || []).map((x) => (x.id === h.id ? { ...withoutLegacyPhoto(x), photos: [...(x.photos || (x.photo ? [x.photo] : [])), ...newOnes], done: true } : x)),
        }));
      }
    } catch (e) { setErr(friendlyErrorMessage(e)); }
    setBusy(false);
  }
  async function removePhoto(idx) {
    await updateData(studentId, (d) => ({
      ...d,
      homework: (d.homework || []).map((x) => (x.id === h.id ? { ...withoutLegacyPhoto(x), photos: (x.photos || (x.photo ? [x.photo] : [])).filter((_, i) => i !== idx) } : x)),
    }));
  }
  async function toggleDone() { await updateData(studentId, (d) => ({ ...d, homework: (d.homework || []).map((x) => (x.id === h.id ? { ...x, done: !x.done } : x)) })); }

  return html`
    <${Card}>
      <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>내준 날짜 ${fmtDate(h.assignedDate)}</div>
      <div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${h.content}</div>
      ${photos.length > 0 && html`
        <div style=${{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8 }}>
          ${photos.map((p, pi) => html`
            <div key=${pi} style=${{ position: "relative" }}>
              <img src=${p} style=${{ width: 76, height: 76, objectFit: "cover", borderRadius: 4, border: `1px solid ${C.line}`, display: "block" }} />
              <button onClick=${() => removePhoto(pi)} style=${{ position: "absolute", top: -6, right: -6, width: 20, height: 20, borderRadius: "50%", border: "none", background: C.danger, color: "#fff", fontSize: 11, cursor: "pointer", lineHeight: "20px", padding: 0 }}>✕</button>
            </div>
          `)}
        </div>
      `}
      <div style=${{ display: "flex", alignItems: "center", gap: 12, marginTop: 10, flexWrap: "wrap" }}>
        <label htmlFor=${busy ? undefined : inputId} style=${{ fontSize: 12.5, fontWeight: 600, padding: "8px 14px", borderRadius: 3, border: `1px solid ${C.navy}`, color: busy ? C.slate : C.navy, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, pointerEvents: busy ? "none" : "auto" }}>
          ${busy ? "업로드 중..." : photos.length > 0 ? "인증샷 추가하기" : "인증샷 올리기"}
        </label>
        <input id=${inputId} type="file" accept="image/*" multiple onChange=${handleFile} style=${{ display: "none" }} disabled=${busy} />

        <div onClick=${toggleDone} style=${{ display: "inline-flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 12.5, color: h.done ? C.gold : C.slate, fontWeight: 600 }}>
          ${h.done ? "✓ 완료함" : "완료로 표시하기"}
        </div>
      </div>
      ${err && html`<div style=${{ fontSize: 11.5, color: C.danger, marginTop: 6 }}>${err}</div>`}
    <//>
  `;
}

function withoutLegacyPhoto(obj) {
  const { photo, ...rest } = obj;
  return rest;
}
function friendlyErrorMessage(e) {
  const msg = ((e && e.message) || "").toLowerCase();
  const code = (e && e.code) || "";
  if (msg.includes("longer than") || msg.includes("exceeds") || msg.includes("too large") || code === "invalid-argument" || code === "resource-exhausted") {
    return "이 학생의 저장 공간이 가득 찼어요 (사진이 너무 많이 쌓였을 때 생겨요). 오래된 사진을 몇 장 지운 뒤 다시 시도해 주세요.";
  }
  if (code === "permission-denied") {
    return "저장 권한 문제가 있어요. Firebase 콘솔에서 Firestore 보안 규칙을 확인해 주세요.";
  }
  return "저장하는 데 문제가 있었어요. 인터넷 연결을 확인하고 다시 시도해 주세요.";
}

function checkWordAnswer(userAnswer, correctWord, synonyms) {
  const norm = normText(userAnswer);
  if (!norm) return false;
  if (norm === normText(correctWord)) return true;
  if ((synonyms || []).some((s) => normText(s) === norm)) return true;
  return isKnownSynonym(userAnswer, correctWord);
}

function TestTaker({ activeTest, onExit, onSubmit }) {
  const { type, test } = activeTest;
  const questions = type === "vocab" ? test.words : test.questions;
  const total = questions.length;
  const [directions] = useState(() => (type === "vocab" ? questions.map(() => (Math.random() < 0.5 ? "w2m" : "m2w")) : null));
  const [answers, setAnswers] = useState(type === "vocab" ? Array(total).fill("") : Array(total).fill(null));
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [breakdown, setBreakdown] = useState(null);

  function pick(qi, val) { if (submitted) return; setAnswers((a) => a.map((v, idx) => (idx === qi ? val : v))); }

  function submit() {
    let score = 0; const rows = [];
    questions.forEach((q, i) => {
      if (type === "vocab") {
        const dir = directions[i];
        if (dir === "w2m") {
          const ok = checkVocabAnswer(answers[i], q.meaning, q.synonyms);
          if (ok) score++;
          rows.push({ prompt: q.word, given: answers[i] || "(빈칸)", correct: q.meaning, ok });
        } else {
          const ok = checkWordAnswer(answers[i], q.word, q.synonyms);
          if (ok) score++;
          const correctDisplay = (q.synonyms && q.synonyms.length) ? `${q.word} (${q.synonyms.join(", ")}도 정답)` : q.word;
          rows.push({ prompt: q.meaning, given: answers[i] || "(빈칸)", correct: correctDisplay, ok });
        }
      } else {
        const ok = answers[i] === q.answer;
        if (ok) score++;
        rows.push({ prompt: q.q, given: answers[i] != null ? q.choices[answers[i]] : "(선택 안 함)", correct: q.choices[q.answer], ok });
      }
    });
    setResult(score); setBreakdown(rows); setSubmitted(true);
  }

  if (submitted) {
    return html`
      <div>
        <${Card} style=${{ textAlign: "center", padding: 28 }}>
          <div style=${{ ...serif, fontSize: 20, color: C.navy, marginBottom: 8 }}>${test.title}</div>
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 16 }}>채점 결과</div>
          <div style=${{ fontSize: 34, ...serif, color: C.gold }}>${result} <span style=${{ fontSize: 18, color: C.slate }}>/ ${total}</span></div>
        <//>
        ${breakdown && html`
          <${Card}>
            ${breakdown.map((r, i) => html`
              <div key=${i} style=${{ padding: "8px 0", borderBottom: i < breakdown.length - 1 ? `1px solid ${C.line}` : "none" }}>
                <div style=${{ fontSize: 12.5, fontWeight: 700, color: C.navy, whiteSpace: "pre-wrap" }}>${i + 1}. ${r.prompt}</div>
                <div style=${{ fontSize: 12, marginTop: 3, color: r.ok ? C.navy : C.danger }}>내 답: ${r.given} ${r.ok ? "✓" : "✗"}</div>
                ${!r.ok && html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 1 }}>정답: ${r.correct}</div>`}
              </div>
            `)}
          <//>
        `}
        <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} onClick=${() => onSubmit(result, total, breakdown)}>결과 저장하고 나가기<//>
      </div>
    `;
  }

  return html`
    <div>
      <${BackBtn} onClick=${onExit} />
      <div style=${{ ...serif, fontSize: 18, color: C.navy, marginBottom: 12 }}>${test.title}</div>
      ${questions.map((q, qi) => html`
        <${Card} key=${qi}>
          <div style=${{ fontSize: 13, fontWeight: 700, color: C.navy, marginBottom: 10, whiteSpace: "pre-wrap" }}>${qi + 1}. ${type === "vocab" ? (directions[qi] === "w2m" ? q.word : q.meaning) : q.q}</div>
          ${type === "vocab" ? html`
            <input style=${inputStyle} placeholder=${directions[qi] === "w2m" ? "뜻을 입력하세요" : "영어 단어를 입력하세요"} value=${answers[qi]} onChange=${(e) => pick(qi, e.target.value)} />
          ` : q.choices.map((opt, oi) => {
            const selected = answers[qi] === oi;
            return html`
              <div key=${oi} onClick=${() => pick(qi, oi)} style=${{ padding: "9px 12px", border: `1px solid ${selected ? C.gold : C.line}`, background: selected ? "#FBF4EA" : C.white, borderRadius: 3, marginBottom: 6, fontSize: 13, cursor: "pointer" }}>${opt}</div>
            `;
          })}
        <//>
      `)}
      <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} disabled=${answers.some((a) => a === null || a === "")} onClick=${submit}>제출하기<//>
    </div>
  `;
}

                  </div>
                `}
                ${(h.audios || (h.audio ? [h.audio] : [])).map((a, ai) => html`<audio key=${ai} controls src=${a} style=${{ width: "100%", height: 32, marginTop: 8 }} />`)}
                <div style=${{ marginTop: 8, fontSize: 12.5, color: h.done ? C.gold : C.slate, fontWeight: 600 }}>${h.done ? "✓ 완료함" : "아직 미완료"}</div>
              <//>
            `)}
          </div>
        `))}

      ${tab === "feedback" && html`
        <${Card}>
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 8 }}>선생님께 궁금한 점이나 상담 요청을 남겨보세요.</div>
          <textarea style=${{ ...inputStyle, minHeight: 80 }} value=${commentText} onChange=${(e) => setCommentText(e.target.value)} placeholder="예: 다음 주 화요일에 상담 가능하실까요?" />
          <div style=${{ marginTop: 8, display: "flex", alignItems: "center", gap: 10 }}>
            <${Button} variant="gold" onClick=${sendComment}>전달하기<//>
            ${commentSent && html`<span style=${{ fontSize: 12, color: C.navy }}>${commentSent}</span>`}
          </div>
        <//>
        ${data.feedback.length === 0 ? html`<${Empty} text="아직 남긴 내용이 없어요." />` : data.feedback.map((f) => html`
          <${Card} key=${f.id} style=${f.from === "parent" ? { borderLeft: `3px solid ${C.gold}` } : {}}>
            <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>${fmtDate(f.date)} · ${f.from === "parent" ? "나의 코멘트" : "선생님"}</div>
            <div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${f.text}</div>
          <//>
        `)}
      `}
    </div>
  `;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(html`<${App} />`);
}); // end DOMContentLoaded
</script>
</body>
</html>
