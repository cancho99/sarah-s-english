// roster/teacherAuth live in one small "meta" doc.
// Each student's own data (logs/homework/feedback/tests/etc, including photos & audio)
// lives in its own doc, so one student's data never affects another's, and we
// stay well clear of Firestore's 1MB-per-document limit as the roster grows.
const META_COLLECTION = "sarahsEnglishMeta";
const META_DOC_ID = "main";
const STUDENTS_COLLECTION = "sarahsEnglishStudents";

let store = null; // in-memory cache: { roster, teacherAuth, studentData }

async function loadStore(attempts = 3) {
  for (let i = 0; i < attempts; i++) {
    try {
      const ref = window.__doc(window.__db, META_COLLECTION, META_DOC_ID);
      const snap = await window.__getDoc(ref);
      const rec = snap.exists() ? snap.data() : {};
      store = {
        roster: Array.isArray(rec.roster) ? rec.roster : [],
        teacherAuth: rec.teacherAuth || null,
        levelTestBookings: Array.isArray(rec.levelTestBookings) ? rec.levelTestBookings : [],
        announcement: rec.announcement || null,
        studentData: {}, // fetched per-student on demand via ensureData()
      };
      return store;
    } catch (e) {
      console.error("loadStore error", e);
      if (i === attempts - 1) throw e;
      await new Promise((r) => setTimeout(r, 500 * (i + 1)));
    }
  }
}

async function saveMeta() {
  try {
    const ref = window.__doc(window.__db, META_COLLECTION, META_DOC_ID);
    await window.__setDoc(ref, { roster: store.roster, teacherAuth: store.teacherAuth, levelTestBookings: store.levelTestBookings || [], announcement: store.announcement || null });

  } catch (e) {
    console.error("saveMeta error", e);

}

async function loadStudentDoc(id) {

function splitFirst(line, delim) {
  const idx = line.indexOf(delim);
  if (idx === -1) return null;
  return [line.slice(0, idx).trim(), line.slice(idx + delim.length).trim()];
}
function parseVocabPaste(text) {
  const lines = text.split("\n").map((l) => l.trim()).filter(Boolean);
  const rows = [];
  for (const line of lines) {
    let pair = splitFirst(line, " - ") || splitFirst(line, "\t") || splitFirst(line, ":") || splitFirst(line, ",");
    if (!pair) {
      const m = line.split(/\s{2,}/);
      if (m.length >= 2) pair = [m[0].trim(), m.slice(1).join(" ").trim()];
    }
    if (pair) {
      const [word, meaning] = pair;
      if (word && meaning) rows.push({ word, meaning });
    }
  }
  return rows;
}
function parseExamPaste(text) {
  const blocks = text.split(/\n\s*\n/).map((b) => b.trim()).filter(Boolean);
  const out = [];
  for (const block of blocks) {
    const lines = block.split("\n").map((l) => l.trim()).filter(Boolean);
    if (lines.length < 3) continue;
    const isMarker = (l) => /^(?:[в‘ в‘Ўв‘ўв‘Јв‘Ө]|[1-9][.\)]|[A-Da-d][.\)])\s*/.test(l);
    const isAnswer = (l) => /^м •лӢө\s*[:пјҡ]?/.test(l);
    const qLines = [];
    let i = 0;
    while (i < lines.length && !isMarker(lines[i]) && !isAnswer(lines[i])) { qLines.push(lines[i]); i++; }
    if (qLines.length === 0) continue;
    qLines[0] = qLines[0].replace(/^\d+[.\)]\s*/, "");
    const qText = qLines.join("\n");
    const choices = [];
    let answerIdx = 0;
    for (; i < lines.length; i++) {
      const line = lines[i];
      const ansMatch = line.match(/^м •лӢө\s*[:пјҡ]?\s*([1-9A-Da-d])/);
      if (ansMatch) {
        const a = ansMatch[1];
        answerIdx = /[1-9]/.test(a) ? parseInt(a, 10) - 1 : a.toUpperCase().charCodeAt(0) - 65;
        continue;
      }
      const marker = line.match(/^(?:[в‘ в‘Ўв‘ўв‘Јв‘Ө]|[1-9][.\)]|[A-Da-d][.\)])\s*/);
      if (marker) choices.push(line.slice(marker[0].length).trim());
      else if (choices.length > 0) choices[choices.length - 1] += " " + line;
    }
    if (qText && choices.length >= 2) out.push({ q: qText, choices, answer: Math.min(Math.max(answerIdx, 0), choices.length - 1) });
  }
  return out;
}
function normText(s) { return (s || "").replace(/\s+/g, "").toLowerCase(); }
function checkVocabAnswer(userAnswer, correctMeaning, synonyms) {
  const norm = normText(userAnswer);
  if (!norm) return false;
  const segments = correctMeaning.split(/[,;/В·]|\(|\)|\[|\]/).map((s) => normText(s)).filter(Boolean);
  const extra = (synonyms || []).map((s) => normText(s)).filter(Boolean);
  return [...segments, ...extra].some((seg) => seg === norm || (seg.length >= 2 && norm.length >= 2 && (seg.includes(norm) || norm.includes(seg))));
}
async function compressImage(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
          else { width = Math.round(width * (maxDim / height)); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function App() {
  const [screen, setScreen] = useState("home");
  const [roster, setRoster] = useState(null);
  const [teacherAuth, setTeacherAuth] = useState(null);
  const [levelTestBookings, setLevelTestBookings] = useState([]);
  const [announcement, setAnnouncement] = useState(null);
  const [session, setSession] = useState(null);
  const [dataCache, setDataCache] = useState({});
  const [selectedStudentId, setSelectedStudentId] = useState(null);
  const [err, setErr] = useState("");
  const [loadError, setLoadError] = useState(false);
  const [loadTick, setLoadTick] = useState(0);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoadError(false);
      try {
        const s = await loadStore();
        if (cancelled) return;
        setRoster(s.roster);
        setTeacherAuth(s.teacherAuth);
        setLevelTestBookings(s.levelTestBookings || []);
        setAnnouncement(s.announcement || null);
      } catch (e) {
        if (!cancelled) setLoadError(true);
      }
    })();
    return () => { cancelled = true; };
  }, [loadTick]);

  async function saveBookingsList(list) {
    setLevelTestBookings(list);
    if (store) store.levelTestBookings = list;
    await saveMeta();
  }
  async function addBooking(b) {
    const next = [{ id: uid(), status: "лҢҖкё°", createdAt: today(), ...b }, ...levelTestBookings];
    await saveBookingsList(next);
  }
  async function saveAnnouncement(text) {
    const next = text ? { text, updatedAt: today() } : null;
    setAnnouncement(next);
    if (store) store.announcement = next;
    await saveMeta();
  }

  async function ensureData(id) {
    const remote = await loadStudentDoc(id);
    const d = remote || dataCache[id] || emptyData();
    setDataCache((prev) => ({ ...prev, [id]: d }));
    if (store) store.studentData[id] = d;
    return d;
  }
  async function updateData(id, updater) {
    // Use a Firestore transaction so the read-modify-write is atomic on the server.
    // This is what actually prevents data loss from rapid or overlapping edits (e.g. two
    // photos taken back to back, or the teacher and a student editing at the same moment) вҖ”
    // a client-side cache or same-tab queue can't protect against a second browser tab/device
    // writing in between, but a transaction does.
    const ref = window.__doc(window.__db, STUDENTS_COLLECTION, id);
    let next;
    await window.__runTransaction(window.__db, async (tx) => {
      const snap = await tx.get(ref);
      const cur = snap.exists() ? snap.data() : (dataCache[id] || emptyData());
      next = updater(cur);
      tx.set(ref, next);
    });
    setDataCache((prev) => ({ ...prev, [id]: next }));
    if (store) store.studentData[id] = next;
    return next;
  }
  async function saveRosterList(list) {
    setRoster(list);
    if (store) store.roster = list;
    await saveMeta();
  }
  async function saveTeacherAuthGlobal(ta) {
    setTeacherAuth(ta);
    if (store) store.teacherAuth = ta;
    await saveMeta();
  }

  function logout() {
    setSession(null); setSelectedStudentId(null); setErr(""); setScreen("home");
  }

  if (loadError) {
    return html`
      <div style=${{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: C.slate, gap: 14, padding: 20, textAlign: "center" }}>
        <div style=${{ fontSize: 15, color: C.navy, fontWeight: 700 }}>лҚ°мқҙн„°лҘј л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–Ҳм–ҙмҡ”</div>
        <div style=${{ fontSize: 13 }}>л„ӨнҠёмӣҢнҒ¬ мғҒнғңлҘј нҷ•мқён•ҳкі  лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”. (м•Ҳм „мқ„ мң„н•ҙ, л¶Ҳлҹ¬мҳӨкё° м „м—җлҠ” м•„л¬ҙ кІғлҸ„ м ҖмһҘн•ҳм§Җ м•Ҡм•„мҡ”)</div>
        <${Button} variant="gold" onClick=${() => setLoadTick((n) => n + 1)}>лӢӨмӢң мӢңлҸ„<//>
      </div>
    `;
  }

  if (roster === null) {
    return html`<div style=${{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: C.slate }}>л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>`;
  }

  const isWide = screen === "home" || screen === "teacherDash";
  return html`
    <div style=${{ minHeight: "100vh", background: C.ivory }}>
      ${screen !== "home" && html`<${TopBar} tagline=${screen === "teacherDash" ? "Teacher Console" : screen === "studentDash" ? "Student Portal" : screen === "parentDash" ? "Parent Portal" : "learning, tracked with care"} />`}
      <div style=${{ maxWidth: isWide ? 1080 : 480, margin: "0 auto", padding: screen === "home" ? "0 0 60px" : isWide ? "18px 16px 60px" : "18px 16px 60px" }}>
        ${screen === "home" && html`<${HomePage} setScreen=${setScreen} announcement=${announcement} />`}
        ${screen === "levelTest" && html`<${LevelTestBooking} onBack=${() => setScreen("home")} onSubmit=${async (b) => { await addBooking(b); }} />`}
        ${screen === "teacherLogin" && html`<${TeacherLogin} teacherAuth=${teacherAuth} onBack=${() => setScreen("home")}
          onSetPass=${async (p) => { const ta = { passcode: p }; await saveTeacherAuthGlobal(ta); setSession({ role: "teacher" }); setScreen("teacherDash"); }}
          onLogin=${(p) => { if (teacherAuth && p === teacherAuth.passcode) { setSession({ role: "teacher" }); setScreen("teacherDash"); } else setErr("л№„л°ҖлІҲнҳёк°Җ л§һм§Җ м•Ҡм•„мҡ”."); }}
          err=${err} />`}
        ${screen === "studentLogin" && html`<${StudentParentLogin} mode="student" roster=${roster} onBack=${() => setScreen("home")}
          onLogin=${(s) => { setSession({ role: "student", student: s }); setScreen("studentDash"); }} />`}
        ${screen === "parentLogin" && html`<${StudentParentLogin} mode="parent" roster=${roster} onBack=${() => setScreen("home")}
          onLogin=${(s) => { setSession({ role: "parent", student: s }); setScreen("parentDash"); }} />`}
        ${screen === "teacherDash" && html`<${TeacherDash} roster=${roster} saveRosterList=${saveRosterList}
          selectedStudentId=${selectedStudentId} setSelectedStudentId=${setSelectedStudentId}
          ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout}
          levelTestBookings=${levelTestBookings} saveBookingsList=${saveBookingsList}
          announcement=${announcement} saveAnnouncement=${saveAnnouncement} />`}
        ${screen === "studentDash" && html`<${StudentDash} student=${session.student} ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout} />`}
        ${screen === "parentDash" && html`<${ParentDash} student=${session.student} ensureData=${ensureData} updateData=${updateData} dataCache=${dataCache} onLogout=${logout} />`}
      </div>
    </div>
  `;
}

    if (!trimmed) { setErr("мҪ”л“ңлҘј мһ…л Ҙн•ҙ мЈјм„ёмҡ”."); return; }
    const s = roster.find((r) => (mode === "student" ? r.studentCode : r.parentCode) === trimmed);
    if (!s) { setErr("мҪ”л“ңк°Җ л§һм§Җ м•Ҡм•„мҡ”. м„ мғқлӢҳк»ҳ нҷ•мқён•ҙ мЈјм„ёмҡ”."); return; }
    onLogin(s);
  }
  return html`
    <div style=${{ display: "flex", justifyContent: "center", padding: "30px 0" }}>
      <div style=${{ width: "100%", maxWidth: 380 }}>
        <${BackBtn} onClick=${onBack} />
        <div style=${{ background: C.white, border: `1px solid ${C.line}`, borderTop: `3px solid ${C.gold}`, padding: "34px 30px", marginTop: 14 }}>
          <div style=${{ textAlign: "center", marginBottom: 24 }}>
            <div style=${{ width: 44, height: 44, borderRadius: "50%", border: `1px solid ${C.navy}`, display: "flex", alignItems: "center", justifyContent: "center", color: C.navy, ...serif, fontSize: 16, margin: "0 auto 12px" }}>SВ·E</div>
            <div style=${{ ...serif, fontSize: 20, color: C.navy }}>${mode === "student" ? "н•ҷмғқ лЎңк·ёмқё" : "н•ҷл¶ҖлӘЁ лЎңк·ёмқё"}</div>
          </div>
          ${roster.length === 0 ? html`<${Empty} text="м•„м§Ғ л“ұлЎқлҗң н•ҷмғқмқҙ м—Ҷм–ҙмҡ”. м„ мғқлӢҳк»ҳ л“ұлЎқмқ„ мҡ”мІӯн•ҙ мЈјм„ёмҡ”." />` : html`
            <${Field} label=${mode === "student" ? "н•ҷмғқ мҪ”л“ң" : "н•ҷл¶ҖлӘЁ мҪ”л“ң"}>
              <input style=${inputStyle} value=${code} onChange=${(e) => setCode(e.target.value)}
                onKeyDown=${(e) => e.key === "Enter" && submit()} placeholder="м„ мғқлӢҳк»ҳ л°ӣмқҖ мҪ”л“ңлҘј мһ…л Ҙн•ҳм„ёмҡ”" autoFocus />
            <//>
            ${err && html`<div style=${{ color: C.danger, fontSize: 12, marginBottom: 8 }}>${err}</div>`}
            <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center", marginTop: 6 }} onClick=${submit}>лЎңк·ёмқё<//>
          `}
        </div>
      </div>
    </div>
  `;
}

  const [loaded, setLoaded] = useState(false);
  const [annText, setAnnText] = useState(announcement ? announcement.text : "");
  const [annSaved, setAnnSaved] = useState(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      for (const s of roster) { await ensureData(s.id); if (cancelled) return; }
      if (!cancelled) setLoaded(true);
    })();
    return () => { cancelled = true; };
  }, []);
  useEffect(() => { setAnnText(announcement ? announcement.text : ""); }, [announcement]);

  async function submitAnnouncement() {
    await saveAnnouncement(annText.trim());
    setAnnSaved(true);
    setTimeout(() => setAnnSaved(false), 2500);
  }

  const pendingBookings = (levelTestBookings || []).filter((b) => b.status !== "мҷ„лЈҢ");
  const todayStr = today();
  const todayHomework = [];
  roster.forEach((s) => {
    const d = dataCache[s.id] || emptyData();
    (d.homework || []).forEach((h) => {
      if (h.dueDate && h.dueDate <= todayStr && !h.done) todayHomework.push({ student: s, hw: h });
    });
  });
  todayHomework.sort((a, b) => a.hw.dueDate.localeCompare(b.hw.dueDate));
  const allConsults = [];
  roster.forEach((s) => {
    const d = dataCache[s.id] || emptyData();
    (d.consultRequests || []).forEach((r) => allConsults.push({ student: s, r }));
  });
  const pendingConsults = allConsults.filter((c) => c.r.status !== "мҷ„лЈҢ");

      ${!showAdd ? html`
        <${Button} variant="ghost" onClick=${() => setShowAdd(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 20 }}>+ н•ҷмғқ м¶”к°Җ<//>

          <${Field} label="н•ҷмғқ мҪ”л“ң (н•ҷмғқ лЎңк·ёмқёмҡ©)"><input style=${inputStyle} value=${sc} onChange=${(e) => setSc(e.target.value)} /><//>
          <${Field} label="н•ҷл¶ҖлӘЁ мҪ”л“ң (н•ҷл¶ҖлӘЁ лЎңк·ёмқёмҡ©)"><input style=${inputStyle} value=${pc} onChange=${(e) => setPc(e.target.value)} /><//>
          ${addErr && html`<div style=${{ color: C.danger, fontSize: 12, marginBottom: 8 }}>${addErr}</div>`}
          <div style=${{ display: "flex", gap: 8 }}>
            <${Button} variant="gold" onClick=${addStudent}>м ҖмһҘ<//>
            <${Button} variant="ghost" onClick=${() => setShowAdd(false)}>м·ЁмҶҢ<//>
          </div>
        <//>
      `}

      <div style=${{ fontSize: 12, fontWeight: 700, color: C.navy, marginBottom: 8 }}>рҹ“ў кіөм§ҖмӮ¬н•ӯ</div>
      <${Card} style=${{ marginBottom: 20 }}>
        <div style=${{ fontSize: 11.5, color: C.slate, marginBottom: 8 }}>м—¬кё°м—җ м ҒмңјмӢ  лӮҙмҡ©мқҖ м¶”нӣ„ н•ҷмғқВ·н•ҷл¶ҖлӘЁ нҷ”л©ҙм—җлҸ„ н‘ңмӢңн•  мҲҳ мһҲм–ҙмҡ”.</div>

        ${pendingBookings.length === 0 ? html`<div style=${{ fontSize: 12.5, color: C.slate }}>лҢҖкё° мӨ‘мқё л¬ёмқҳк°Җ м—Ҷм–ҙмҡ”.</div>` : pendingBookings.slice(0, 3).map((b) => html`
          <div key=${b.id} style=${{ fontSize: 12.5, padding: "4px 0" }}>${b.name} ${b.grade ? `(${b.grade})` : ""} вҖ” ${b.date}${b.time ? " В· " + b.time : ""}</div>

            <b>${c.student.name}</b> В· ${c.r.method} вҖ” 1м§Җл§қ ${c.r.choices[0].date} ${c.r.choices[0].time}

      <${Card}>

function TeacherDash({ roster, saveRosterList, selectedStudentId, setSelectedStudentId, ensureData, updateData, dataCache, onLogout, levelTestBookings, saveBookingsList, announcement, saveAnnouncement }) {
  const [section, setSection] = useState("students");
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState(""); const [sc, setSc] = useState(""); const [pc, setPc] = useState("");
  const [addErr, setAddErr] = useState("");
  const [showStatus, setShowStatus] = useState(false);
  const [showBookings, setShowBookings] = useState(false);
  const selected = roster.find((r) => r.id === selectedStudentId);
  const pendingCount = (levelTestBookings || []).filter((b) => b.status !== "мҷ„лЈҢ").length;

  useEffect(() => { if (selectedStudentId) ensureData(selectedStudentId); }, [selectedStudentId]);

  async function addStudent() {
    if (!name || !sc || !pc) return;
    const dupe = roster.some((r) => r.studentCode === sc || r.parentCode === sc || r.studentCode === pc || r.parentCode === pc);
    if (dupe) { setAddErr("мқҙлҜё мӮ¬мҡ© мӨ‘мқё мҪ”л“ңмҳҲмҡ”. лӢӨлҘё мҪ”л“ңлҘј мһ…л Ҙн•ҙ мЈјм„ёмҡ”."); return; }
    const s = { id: uid(), name, studentCode: sc, parentCode: pc };
    await saveRosterList([...roster, s]);
    setName(""); setSc(""); setPc(""); setAddErr(""); setShowAdd(false);
  }
  async function removeStudent(id) {
    await saveRosterList(roster.filter((r) => r.id !== id));
    if (selectedStudentId === id) setSelectedStudentId(null);
  }

  const studentSubItems = section === "students" ? [
    { key: "__bookings", label: `л ҲлІЁн…ҢмҠӨнҠё мҳҲм•Ҫ${pendingCount > 0 ? ` (${pendingCount})` : ""}`, icon: "рҹ—“" },
    { key: "__hwstatus", label: "мҲҷм ң нҳ„нҷ©", icon: "рҹ“Ӣ" },
    ...roster.map((r) => ({ key: "__student:" + r.id, label: r.name, icon: "рҹ‘Ө" })),
  ] : [];
  const navItems = [
    { key: "students", label: "н•ҷмғқ кҙҖлҰ¬", icon: "рҹ—Ӯ" },
    ...studentSubItems,
    { key: "wordbank", label: "лӢЁм–ҙ мӢңн—ҳм§Җ мғқм„ұ", icon: "рҹ”Ө" },
    { key: "reports", label: "лҰ¬нҸ¬нҠё мһ‘м„ұ", icon: "рҹ“Ҡ" },
  ];

  const activeKey = selected ? "__student:" + selected.id : showBookings ? "__bookings" : showStatus ? "__hwstatus" : section;

  function handleNavChange(key) {
    if (key === "students") { setSection("students"); setSelectedStudentId(null); setShowStatus(false); setShowBookings(false); }
    else if (key === "wordbank" || key === "reports") { setSection(key); setSelectedStudentId(null); setShowStatus(false); setShowBookings(false); }
    else if (key === "__bookings") { setSection("students"); setSelectedStudentId(null); setShowStatus(false); setShowBookings(true); }
    else if (key === "__hwstatus") { setSection("students"); setSelectedStudentId(null); setShowBookings(false); setShowStatus(true); }
    else if (key.startsWith("__student:")) { setSection("students"); setShowStatus(false); setShowBookings(false); setSelectedStudentId(key.slice("__student:".length)); }
  }

  let body;
  if (section === "wordbank") {
    body = html`<${WordbankSection} />`;
  } else if (section === "reports") {
    body = html`<${ReportsSection} roster=${roster} ensureData=${ensureData} dataCache=${dataCache} />`;
  } else if (showStatus) {
    body = html`<${HomeworkStatusOverview} roster=${roster} ensureData=${ensureData} dataCache=${dataCache} onBack=${() => setShowStatus(false)} onLogout=${onLogout} />`;
  } else if (showBookings) {
    body = html`<${LevelTestBookingsOverview} bookings=${levelTestBookings} saveBookingsList=${saveBookingsList} onBack=${() => setShowBookings(false)} onLogout=${onLogout} />`;
  } else if (selected) {
    const data = dataCache[selected.id] || emptyData();
    body = html`<${TeacherStudentPanel} student=${selected} data=${data} onBackToList=${() => setSelectedStudentId(null)}
      updateData=${(updater) => updateData(selected.id, updater)} onLogout=${onLogout} onDeleteStudent=${() => removeStudent(selected.id)} />`;
  } else {
    body = html`<${TeacherOverview} roster=${roster} ensureData=${ensureData} dataCache=${dataCache}
      levelTestBookings=${levelTestBookings} announcement=${announcement} saveAnnouncement=${saveAnnouncement}
      onGoBookings=${() => { setShowBookings(true); }} onGoHwStatus=${() => { setShowStatus(true); }}
      onSelectStudent=${(id) => setSelectedStudentId(id)}
      showAdd=${showAdd} setShowAdd=${setShowAdd} name=${name} setName=${setName} sc=${sc} setSc=${setSc} pc=${pc} setPc=${setPc}
      addErr=${addErr} addStudent=${addStudent} />`;
  }

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style=${{ ...serif, fontSize: 18, color: C.navy }}>Teacher Dashboard</div>
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>лЎңк·ём•„мӣғ</button>
      </div>
      <${Shell} side=${html`<${SideNav} items=${navItems} active=${activeKey} onChange=${handleNavChange} />`}>${body}<//>
    </div>
  `;
}

function HomeworkStatusOverview({ roster, ensureData, dataCache, onBack, onLogout }) {
  const [loaded, setLoaded] = useState(false);
  const [studentFilter, setStudentFilter] = useState("");

  useEffect(() => {
    let cancelled = false;
    (async () => {
      for (const s of roster) { await ensureData(s.id); if (cancelled) return; }
      if (!cancelled) setLoaded(true);
    })();
    return () => { cancelled = true; };
  }, []);

  const byDate = {};
  roster.forEach((s) => {
    if (studentFilter && s.id !== studentFilter) return;
    const d = dataCache[s.id] || emptyData();
    (d.homework || []).forEach((h) => {
      if (h.done) return; // only show incomplete homework
      const date = h.dueDate || h.assignedDate;
      if (!date) return;
      if (!byDate[date]) byDate[date] = {};
      if (!byDate[date][s.id]) byDate[date][s.id] = { student: s, items: [] };
      byDate[date][s.id].items.push(h);

function StorageCleanupPanel({ data, updateData }) {
  const [msg, setMsg] = useState("");
  const sizeBytes = new Blob([JSON.stringify(data)]).size;
  const sizeKB = Math.round(sizeBytes / 1024);
  const LIMIT_KB = 1000; // Firestore's hard cap is 1MB per document
  const pct = Math.min(100, Math.round((sizeBytes / (LIMIT_KB * 1024)) * 100));
  const photoCount = (data.homework || []).reduce((sum, h) => sum + (h.photos || (h.photo ? [h.photo] : [])).length, 0);
  const vocabResultCount = (data.vocabResults || []).length;
  const examResultCount = (data.examResults || []).length;
  const logCount = (data.logs || []).length;

  async function clearAllPhotos() {
    if (!confirm("мқҙ н•ҷмғқмқҳ лӘЁл“  мҲҷм ң мӮ¬м§„мқ„ мӮӯм ңн• к№Ңмҡ”? мҲҷм ң лӮҙмҡ©кіј мҷ„лЈҢ н‘ңмӢңлҠ” к·ёлҢҖлЎң лӮЁм•„мҡ”.")) return;
    await updateData((d) => ({ ...d, homework: (d.homework || []).map((h) => ({ ...withoutLegacyPhoto(h), photos: [] })) }));
    setMsg("мӮ¬м§„мқ„ лӘЁл‘җ мӮӯм ңн–Ҳм–ҙмҡ”.");
  }
  async function clearVocabResults() {
    if (!confirm("лӢЁм–ҙ мһ¬мӢңн—ҳ(нҖҙмҰҲ) мқ‘мӢң кё°лЎқмқ„ м „л¶Җ мӮӯм ңн• к№Ңмҡ”? нҖҙмҰҲ мһҗмІҙ(л¬ём ң)лҠ” лӮЁкі , н•ҷмғқмқҙ мқ‘мӢңн–ҲлҚҳ кІ°кіј кё°лЎқл§Ң м§ҖмӣҢм ёмҡ”.")) return;
    await updateData((d) => ({ ...d, vocabResults: [] }));

    await updateData((d) => ({ ...d, examResults: [] }));
    setMsg("м¶”к°Җ мӢңн—ҳ мқ‘мӢң кё°лЎқмқ„ м •лҰ¬н–Ҳм–ҙмҡ”.");
  }
  async function resetEverything() {
    if (!confirm("мқҙ н•ҷмғқмқҳ лӘЁл“  кё°лЎқ(н•ҷмҠөкё°лЎқВ·мҲҷм ңВ·мӢңн—ҳВ·мӮ¬м§„ л“ұ)мқ„ м „л¶Җ мҙҲкё°нҷ”н• к№Ңмҡ”? н•ҷмғқ мқҙлҰ„/мҪ”л“ңлҠ” к·ёлҢҖлЎң лӮЁкі  лҗҳлҸҢлҰҙ мҲҳ м—Ҷм–ҙмҡ”.")) return;
    await updateData(() => emptyData());
    setMsg("м „мІҙ лҚ°мқҙн„°лҘј мҙҲкё°нҷ”н–Ҳм–ҙмҡ”.");
  }

  return html`
    <div>
      <${Card}>
        <div style=${{ fontSize: 12.5, color: C.slate, marginBottom: 8 }}>FirebaseлҠ” н•ҷмғқ н•ң лӘ…мқҳ кё°лЎқмқ„ л¬ём„ң н•ҳлӮҳ(мөңлҢҖ 1MB)м—җ м ҖмһҘн•ҙмҡ”. м—¬кё°м„ң нҳ„мһ¬ мҡ©лҹүмқ„ нҷ•мқён•ҳкі , кҪү м°јмқ„ л•Ң м •лҰ¬н•  мҲҳ мһҲм–ҙмҡ”.</div>
        <div style=${{ fontSize: 20, fontWeight: 700, color: pct > 80 ? C.danger : C.navy }}>${sizeKB}KB <span style=${{ fontSize: 12, color: C.slate, fontWeight: 400 }}>/ м•Ҫ ${LIMIT_KB}KB мӨ‘</span></div>
        <div style=${{ height: 8, background: C.line, borderRadius: 4, marginTop: 8, overflow: "hidden" }}>
          <div style=${{ height: "100%", width: pct + "%", background: pct > 80 ? C.danger : C.gold }} />
        </div>
        ${pct > 70 && html`<div style=${{ fontSize: 12, color: C.danger, marginTop: 8 }}>кіөк°„мқҙ м–јл§Ҳ м•Ҳ лӮЁм•ҳм–ҙмҡ”. м•„лһҳм—җм„ң м •лҰ¬н•ҙ мЈјм„ёмҡ”.</div>`}
      <//>

      <${Card}>
        <div style=${{ fontSize: 12.5, marginBottom: 10 }}>мӮ¬м§„ ${photoCount}мһҘ В· лӢЁм–ҙмһ¬мӢңн—ҳ мқ‘мӢңкё°лЎқ ${vocabResultCount}кұҙ В· м¶”к°ҖмӢңн—ҳ мқ‘мӢңкё°лЎқ ${examResultCount}кұҙ В· н•ҷмҠөкё°лЎқ ${logCount}кұҙ</div>
        <div style=${{ display: "flex", flexDirection: "column", gap: 8 }}>
          <${Button} variant="ghost" onClick=${clearAllPhotos}>мҲҷм ң мӮ¬м§„ м „мІҙ мӮӯм ң (лӮҙмҡ©мқҖ мң м§Җ)<//>
          <${Button} variant="ghost" onClick=${clearVocabResults}>лӢЁм–ҙ мһ¬мӢңн—ҳ мқ‘мӢң кё°лЎқ м •лҰ¬<//>
          <${Button} variant="ghost" onClick=${clearExamResults}>м¶”к°Җ мӢңн—ҳ мқ‘мӢң кё°лЎқ м •лҰ¬<//>
          <${Button} variant="danger" onClick=${resetEverything}>мқҙ н•ҷмғқ м „мІҙ лҚ°мқҙн„° мҙҲкё°нҷ”<//>

function VocabLogEditor({ data, updateData }) {
  const [date, setDate] = useState(today());
  const [book, setBook] = useState(BOOK_LIST[0]);
  const [customBook, setCustomBook] = useState("");
  const [range, setRange] = useState("");
  const [correct, setCorrect] = useState("");
  const [total, setTotal] = useState("");
  const [retest, setRetest] = useState("");

  const isCumulative = range.includes("лҲ„м Ғ");
  const threshold = isCumulative ? 90 : 80;
  const pct = total ? Math.round((Number(correct) / Number(total)) * 100) : null;
  const allowedWrong = total ? Math.round(Number(total) * (isCumulative ? 0.10 : 0.20)) : null;
  const wrongCount = total && correct !== "" ? Number(total) - Number(correct) : null;
  const willPass = wrongCount !== null ? wrongCount <= allowedWrong : null;
  const effectiveBook = book === "__other__" ? customBook.trim() : book;

  async function add() {
    if (!date || !total || !range || !effectiveBook) return;
    const scorePct = Math.round((Number(correct) / Number(total)) * 100);
    const allowed = Math.round(Number(total) * (range.includes("лҲ„м Ғ") ? 0.10 : 0.20));
    const passed = (Number(total) - Number(correct)) <= allowed;
    await updateData((d) => ({
      ...d,
      vocabLog: [{ id: uid(), date, book: effectiveBook, range, correct: Number(correct), total: Number(total), score: scorePct, passed, retest }, ...(d.vocabLog || [])],
    }));
    setRange(""); setCorrect(""); setTotal(""); setRetest("");
  }
  async function remove(id) { await updateData((d) => ({ ...d, vocabLog: (d.vocabLog || []).filter((v) => v.id !== id) })); }

  const list = data.vocabLog || [];
  return html`
    <div>
      <div style=${{ fontSize: 12, color: C.slate, marginBottom: 10 }}>лӢЁм–ҙ мӢңн—ҳмқ„ м§Ғм ‘ ліҙкі  мұ„м җн•ң кІ°кіјлҘј кё°лЎқн•ҳм„ёмҡ”. лІ”мң„м—җ "лҲ„м Ғ"мқҙ л“Өм–ҙк°Җл©ҙ 90%(мҳӨлӢө 10% мқҙлӮҙ), м•„лӢҲл©ҙ 80%(мҳӨлӢө 20% мқҙлӮҙ) кё°мӨҖмңјлЎң мһҗлҸҷ н•©кІ© нҢҗм •лҸјмҡ”. л¬ён•ӯ мҲҳм—җ л§һм¶° л°ҳмҳ¬лҰјн•ң н—Ҳмҡ© мҳӨлӢө к°ңмҲҳлҘј кё°мӨҖмңјлЎң нҢҗм •н•©лӢҲлӢӨ.</div>
      <${Card}>
        <${Field} label="лӮ м§ң"><input style=${inputStyle} type="date" value=${date} onChange=${(e) => setDate(e.target.value)} /><//>
        <${Field} label="көҗмһ¬">
          <select style=${inputStyle} value=${book} onChange=${(e) => setBook(e.target.value)}>
            ${BOOK_LIST.map((b) => html`<option key=${b} value=${b}>${b}</option>`)}
            <option value="__other__">кё°нғҖ (м§Ғм ‘ мһ…л Ҙ)</option>
          </select>
        <//>
        ${book === "__other__" && html`<${Field} label="көҗмһ¬лӘ… м§Ғм ‘ мһ…л Ҙ"><input style=${inputStyle} value=${customBook} onChange=${(e) => setCustomBook(e.target.value)} placeholder="көҗмһ¬ мқҙлҰ„ мһ…л Ҙ" /><//>`}
        <${Field} label="мӢңн—ҳлІ”мң„"><input style=${inputStyle} value=${range} onChange=${(e) => setRange(e.target.value)} placeholder="мҳҲ: Day 1-9 лҲ„м Ғ" /><//>
        <div style=${{ display: "flex", gap: 8 }}>
          <div style=${{ flex: 1 }}><${Field} label="л§һмқҖ к°ңмҲҳ"><input style=${inputStyle} type="number" value=${correct} onChange=${(e) => setCorrect(e.target.value)} /><//></div>
          <div style=${{ flex: 1 }}><${Field} label="мҙқ л¬ён•ӯ"><input style=${inputStyle} type="number" value=${total} onChange=${(e) => setTotal(e.target.value)} /><//></div>
        </div>
        ${pct !== null && html`<div style=${{ fontSize: 12.5, marginBottom: 10, color: willPass ? C.navy : C.danger, fontWeight: 700 }}>${pct}% (мҳӨлӢө ${wrongCount}к°ң) В· ${total}л¬ён•ӯ мӨ‘ мҳӨлӢө ${allowedWrong}к°ңк№Ңм§Җ н—Ҳмҡ© вҶ’ ${willPass ? "н•©кІ©" : "л¶Ҳн•©кІ©"}</div>`}
        <${Field} label="мһ¬мӢңн—ҳ л©”лӘЁ (м„ нғқ)"><input style=${inputStyle} value=${retest} onChange=${(e) => setRetest(e.target.value)} placeholder="мҳҲ: 7/20 10мӢң" /><//>
        <${Button} variant="gold" onClick=${add}>кё°лЎқ м¶”к°Җ<//>
      <//>
      ${list.length === 0 && html`<${Empty} text="м•„м§Ғ кё°лЎқмқҙ м—Ҷм–ҙмҡ”." />`}
      ${list.map((v) => html`
        <${Card} key=${v.id}>
          <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>${fmtDate(v.date)} В· ${v.book}</div>
              <div style=${{ fontSize: 13, marginTop: 4 }}>${v.range} вҖ” ${v.correct}/${v.total} (${v.score}%)</div>
              ${v.retest && html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 2 }}>мһ¬мӢңн—ҳ: ${v.retest}</div>`}
            </div>
            <div style=${{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style=${{ fontSize: 11.5, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: v.passed ? "#E9F1EA" : "#F7E9E6", color: v.passed ? "#3D6B4F" : C.danger }}>${v.passed ? "н•©кІ©" : "л¶Ҳн•©кІ©"}</span>
              <button onClick=${() => remove(v.id)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>вң•</button>
            </div>
          </div>
        <//>
      `)}
    </div>
  `;
}

function DailyReportGenerator({ student, data }) {
  const [date, setDate] = useState(today());
  const [hwFrom, setHwFrom] = useState(today());
  const [copied, setCopied] = useState(false);
  const [text, setText] = useState("");

  useEffect(() => {
    const dt = new Date(date + "T00:00:00");
    const days = ["мқј", "мӣ”", "нҷ”", "мҲҳ", "лӘ©", "кёҲ", "нҶ "];
    const md = `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;

    const logsToday = (data.logs || []).filter((l) => l.date === date);
    const learnedBlock = logsToday.length > 0 ? logsToday.map((l) => l.content).join("\n") : "л¬ёлІ•:\nлҸ…н•ҙ:";

    const vocabToday = (data.vocabLog || []).filter((v) => v.date === date);
    const vocabBlock = vocabToday.length > 0
      ? vocabToday.map((v) => `${v.book} ${v.range}: ${v.correct}/${v.total} (${v.score}%) - ${v.passed ? "н•©кІ©" : "л¶Ҳн•©кІ©"}`).join("\n")
      : "кё°лЎқ м—ҶмқҢ";

    const yesterday = new Date(dt); yesterday.setDate(yesterday.getDate() - 1);
    const y = yesterday.getFullYear(), m2 = String(yesterday.getMonth() + 1).padStart(2, "0"), d2 = String(yesterday.getDate()).padStart(2, "0");
    const yesterdayStr = `${y}-${m2}-${d2}`;
    const fromD = hwFrom && hwFrom <= yesterdayStr ? hwFrom : yesterdayStr;
    const inRange = (d) => d && d >= fromD && d <= yesterdayStr;
    const hwRange = (data.homework || []).filter((h) => inRange(h.dueDate));
    const hwBlock = hwRange.length > 0
      ? hwRange.map((h) => `${h.content} вҶ’ ${h.done ? "мҷ„лЈҢ" : "лҜёмҷ„лЈҢ"}`).join("\n")
      : "кё°лЎқ м—ҶмқҢ";

    const msg = `[${student.name}] ${md} мҲҳм—… м•ҲлӮҙ\nрҹ“– мҳӨлҠҳ л°°мҡҙ лӮҙмҡ©\n${learnedBlock}\nвңҸпёҸ лӢЁм–ҙмӢңн—ҳ кІ°кіј\n${vocabBlock}\nрҹ“қ мҲҷм ң нҷ•мқё\n${hwBlock}`;
    setText(msg);
    setCopied(false);
  }, [student.id, date, hwFrom, data]);

  async function copy() {
    try {
      await navigator.clipboard.writeText(text);
      setCopied(true);
      setTimeout(() => setCopied(false), 2500);
    } catch (e) {
      setCopied(false);
    }
  }

  return html`
    <div>
      <${Card}>
        <${Field} label="мҲҳм—… лӮ м§ң"><input style=${inputStyle} type="date" value=${date} onChange=${(e) => setDate(e.target.value)} /><//>
        <${Field} label="мҲҷм ң нҷ•мқё мӢңмһ‘мқј (м§Ғм „ мҲҳм—… лӢӨмқҢлӮ )"><input style=${inputStyle} type="date" value=${hwFrom} onChange=${(e) => setHwFrom(e.target.value)} /><//>
        <div style=${{ fontSize: 11.5, color: C.slate }}>мӢңмһ‘мқјл¶Җн„° м–ҙм ңк№Ңм§Җ, "м ңм¶ң кё°н•ң"мқҙ к·ё мӮ¬мқҙмқё мҲҷм ңл§Ң лӢҙкІЁмҡ”. мҳӨлҠҳ мҲҳм—…м—җм„ң мғҲлЎң лӮҙмӨҖ мҲҷм ңлҠ” лӢӨмқҢ лҰ¬нҸ¬нҠём—җ л“Өм–ҙк°‘лӢҲлӢӨ.</div>
      <//>
      <${Card}>
        <textarea style=${{ ...inputStyle, minHeight: 220, fontFamily: "inherit", lineHeight: 1.7, whiteSpace: "pre-wrap" }} value=${text} onChange=${(e) => setText(e.target.value)} />
        <div style=${{ display: "flex", alignItems: "center", gap: 10, marginTop: 10 }}>
          <${Button} variant="gold" onClick=${copy}>ліөмӮ¬н•ҳкё°<//>
          ${copied && html`<span style=${{ fontSize: 12, color: C.navy }}>ліөмӮ¬лҗҗм–ҙмҡ” вҖ” л¬ёмһҗлЎң л¶ҷм—¬л„Јмңјм„ёмҡ”.</span>`}
        </div>
      <//>
    </div>
  `;
}

function VocabResultRow({ r, updateData }) {
  const [open, setOpen] = useState(false);
  const pct = Math.round((r.score / r.total) * 100);
  const ok = pct >= 90;
  const hasBreakdown = Array.isArray(r.breakdown) && r.breakdown.length > 0;

  async function markCorrect(idx) {
    await updateData((d) => ({
      ...d,
      vocabResults: d.vocabResults.map((x) => {
        if (x.id !== r.id) return x;
        const breakdown = x.breakdown.map((row, i) => (i === idx ? { ...row, ok: true, manualOverride: true } : row));
        const score = breakdown.filter((row) => row.ok).length;
        return { ...x, breakdown, score };
      }),
    }));
  }

  return html`
    <div style=${{ marginBottom: 6, paddingBottom: 6, borderBottom: `1px solid ${C.line}` }}>
      <div style=${{ fontSize: 12.5, display: "flex", alignItems: "center", gap: 8, cursor: hasBreakdown ? "pointer" : "default" }} onClick=${() => hasBreakdown && setOpen((o) => !o)}>
        <span>${fmtDate(r.date)} мқ‘мӢң вҖ” <b>${r.score}</b> / ${r.total} (${pct}%)</span>
        <span style=${{ fontSize: 10.5, fontWeight: 700, padding: "1px 7px", borderRadius: 20, background: ok ? "#E9F1EA" : "#F7E9E6", color: ok ? "#3D6B4F" : C.danger }}>${ok ? "н•©кІ©" : "мһ¬мӢңн—ҳ н•„мҡ”"}</span>
        ${hasBreakdown && html`<span style=${{ fontSize: 11, color: C.slate, marginLeft: "auto" }}>${open ? "в–І лӢөм•Ҳ лӢ«кё°" : "в–ј лӢөм•Ҳ ліҙкё°"}</span>`}
      </div>
      ${open && hasBreakdown && html`
        <div style=${{ marginTop: 8, background: C.ivory, border: `1px solid ${C.line}`, borderRadius: 4, padding: 10 }}>
          ${r.breakdown.map((row, i) => html`
            <div key=${i} style=${{ padding: "6px 0", borderBottom: i < r.breakdown.length - 1 ? `1px dotted ${C.line}` : "none" }}>
              <div style=${{ fontSize: 12, fontWeight: 700, color: C.navy, whiteSpace: "pre-wrap" }}>${i + 1}. ${row.prompt}</div>
              <div style=${{ fontSize: 12, marginTop: 2, color: row.ok ? C.navy : C.danger }}>н•ҷмғқ лӢө: ${row.given} ${row.ok ? "вң“" : "вң—"}${row.manualOverride ? " (м„ мғқлӢҳ нҷ•мқё м •лӢө мІҳлҰ¬)" : ""}</div>
              ${!row.ok && html`
                <div style=${{ display: "flex", alignItems: "center", gap: 8, marginTop: 3 }}>
                  <div style=${{ fontSize: 11.5, color: C.slate }}>м •лӢө: ${row.correct}</div>
                  <button onClick=${() => markCorrect(i)} style=${{ fontSize: 11, padding: "3px 9px", borderRadius: 20, border: `1px solid ${C.gold}`, background: "none", color: C.gold, cursor: "pointer" }}>л§һлҠ” кұёлЎң мІҳлҰ¬</button>
                </div>
              `}
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

  const [bankCount, setBankCount] = useState("");

  function runParse() {

  }
  async function openBank() {
    setShowBank(true);
    if (bankBooks === null) {
      try {
        const ref = window.__doc(window.__db, "sarahsEnglishWordbank", "main");
        const snap = await window.__getDoc(ref);
        const rec = snap.exists() ? snap.data() : {};
        const books = Array.isArray(rec.books) ? rec.books : [];
        setBankBooks(books);
        if (books[0]) { setBankBookId(books[0].id); setBankTo(books[0].totalDays || 1); }
        if (books.length === 0) setBankMsg("мӣҢл“ңлұ…нҒ¬м—җ л“ұлЎқлҗң көҗмһ¬к°Җ м—Ҷм–ҙмҡ”. лЁјм Җ 'лӢЁм–ҙ мӢңн—ҳм§Җ мғқм„ұ' л©”лүҙм—җм„ң көҗмһ¬мҷҖ лӢЁм–ҙлҘј л“ұлЎқн•ҙ мЈјм„ёмҡ”.");

    }
  }
  function importFromBank() {
    const book = (bankBooks || []).find((b) => b.id === bankBookId);
    if (!book) return;
    const from = Math.max(1, Number(bankFrom) || 1);
    const to = Math.max(from, Math.min(book.totalDays || from, Number(bankTo) || from));
    let picked = [];
    for (let d = from; d <= to; d++) {
      const arr = (book.days || {})["day" + d] || [];
      picked = picked.concat(arr.map((w) => ({ word: w.en, meaning: w.ko })));
    }
    if (picked.length === 0) { setBankMsg("н•ҙлӢ№ лІ”мң„м—җ м ҖмһҘлҗң лӢЁм–ҙк°Җ м—Ҷм–ҙмҡ”."); return; }
    const n = Number(bankCount);
    if (n > 0 && n < picked.length) picked = shuffle(picked).slice(0, n);
    setWords(picked);
    setTitle((t) => t || `${book.name} Day ${from}-${to}`);
    setBankMsg(`${picked.length}к°ң лӢЁм–ҙлҘј л¶Ҳлҹ¬мҷ”м–ҙмҡ”. м•„лһҳм—җм„ң нҷ•мқё нӣ„ м ҖмһҘн•ҳм„ёмҡ”.`);
    setShowBank(false);

      word: w.word, meaning: w.meaning,

    }));
    if (!title || clean.length < 2) return;
    await updateData((d) => ({ ...d, vocabTests: [{ id: uid(), title, date: today(), words: clean }, ...d.vocabTests] }));
    setTitle(""); setWords([{ word: "", meaning: "" }]); setCreating(false);

            <${Button} variant="ghost" onClick=${openBank} style=${{ marginBottom: 12 }}>рҹ“ҡ мӣҢл“ңлұ…нҒ¬м—җм„ң к°Җм ёмҳӨкё°<//>

          ${showPaste && html`

              <textarea style=${{ ...inputStyle, minHeight: 110, fontFamily: "monospace", fontSize: 12.5 }} placeholder=${"apple - мӮ¬кіј\nhesitate - мЈјм Җн•ҳлӢӨ, л§қм„ӨмқҙлӢӨ"} value=${pasteText} onChange=${(e) => setPasteText(e.target.value)} />
              <div style=${{ display: "flex", gap: 8, marginTop: 8 }}>
                <${Button} variant="gold" onClick=${runParse}>к°Җм ёмҳӨкё°<//>

              </div>
            <//>
          `}
          ${showBank && html`
            <${Card} style=${{ background: C.ivory }}>
              ${bankBooks === null ? html`<div style=${{ fontSize: 12.5, color: C.slate }}>л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>` : bankBooks.length === 0 ? html`<div style=${{ fontSize: 12.5, color: C.slate }}>${bankMsg}</div>` : html`

  function runParse() {
    const parsed = parseExamPaste(pasteText);
    if (parsed.length === 0) { setPasteMsg("мқёмӢқлҗң л¬ём ңк°Җ м—Ҷм–ҙмҡ”. нҳ•мӢқмқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”."); return; }
    setQuestions(parsed); setPasteMsg(`${parsed.length}к°ң л¬ём ңлҘј л¶Ҳлҹ¬мҷ”м–ҙмҡ”. м•„лһҳм—җм„ң нҷ•мқё нӣ„ м ҖмһҘн•ҳм„ёмҡ”.`); setShowPaste(false); setPasteText("");
  }
  function setQ(i, val) { setQuestions((qs) => qs.map((row, idx) => (idx === i ? { ...row, q: val } : row))); }
  function setChoice(qi, ci, val) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: row.choices.map((c, cidx) => (cidx === ci ? val : c)) } : row))); }
  function setAnswer(qi, ci) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, answer: ci } : row))); }
  function addChoice(qi) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: [...row.choices, ""] } : row))); }
  function removeChoice(qi, ci) { setQuestions((qs) => qs.map((row, idx) => (idx === qi ? { ...row, choices: row.choices.filter((_, cidx) => cidx !== ci), answer: row.answer === ci ? 0 : row.answer > ci ? row.answer - 1 : row.answer } : row))); }
  function addQuestion() { setQuestions((qs) => [...qs, { q: "", choices: ["", ""], answer: 0 }]); }
  function removeQuestion(i) { setQuestions((qs) => qs.filter((_, idx) => idx !== i)); }
  async function save() {
    const clean = questions.filter((q) => q.q && q.choices.every((c) => c) && q.choices.length >= 2);
    if (!title || clean.length === 0) return;
    await updateData((d) => ({ ...d, examTests: [{ id: uid(), title, date: today(), questions: clean }, ...d.examTests] }));
    setTitle(""); setQuestions([{ q: "", choices: ["", ""], answer: 0 }]); setCreating(false);
  }
  async function removeTest(id) { await updateData((d) => ({ ...d, examTests: d.examTests.filter((t) => t.id !== id) })); }

  return html`
    <div>
      ${!creating ? html`
        <${Button} variant="ghost" onClick=${() => setCreating(true)} style=${{ width: "100%", justifyContent: "center", marginBottom: 12 }}>+ мғҲ м¶”к°Җ мӢңн—ҳ л§Ңл“Өкё°<//>
      ` : html`
        <${Card}>
          <${Field} label="мӢңн—ҳ мқҙлҰ„"><input style=${inputStyle} value=${title} onChange=${(e) => setTitle(e.target.value)} placeholder="мҳҲ: кҙҖкі„лҢҖлӘ…мӮ¬ м¶”к°Җ л¬ём ң" /><//>
          ${!showPaste ? html`
            <${Button} variant="ghost" onClick=${() => setShowPaste(true)} style=${{ marginBottom: 12 }}>л¶ҷм—¬л„Јкё°лЎң н•ңлІҲм—җ к°Җм ёмҳӨкё°<//>
          ` : html`
            <${Card} style=${{ background: C.ivory }}>
              <div style=${{ fontSize: 12, color: C.slate, marginBottom: 6 }}>л¬ём ң мӮ¬мқҙлҠ” л№Ҳ мӨ„лЎң кө¬л¶„н•ҙ мЈјм„ёмҡ”.</div>
              <textarea style=${{ ...inputStyle, minHeight: 160, fontFamily: "monospace", fontSize: 12, whiteSpace: "pre" }}
                placeholder=${"1. лӢӨмқҢ мӨ‘ кҙҖкі„лҢҖлӘ…мӮ¬к°Җ м•Ңл§һмқҖ кІғмқҖ?\n1) who\n2) which\n3) that\n4) whose\nм •лӢө: 1"}
                value=${pasteText} onChange=${(e) => setPasteText(e.target.value)} />
              <div style=${{ display: "flex", gap: 8, marginTop: 8 }}>
                <${Button} variant="gold" onClick=${runParse}>к°Җм ёмҳӨкё°<//>
                <${Button} variant="ghost" onClick=${() => setShowPaste(false)}>м·ЁмҶҢ<//>
              </div>
            <//>
          `}
          ${pasteMsg && html`<div style=${{ fontSize: 12, color: C.navy, marginBottom: 10 }}>${pasteMsg}</div>`}
          ${questions.map((q, qi) => html`
            <div key=${qi} style=${{ border: `1px solid ${C.line}`, borderRadius: 4, padding: 10, marginBottom: 10 }}>
              <div style=${{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <div style=${{ fontSize: 12, color: C.gold, fontWeight: 700 }}>л¬ём ң ${qi + 1}</div>
                ${questions.length > 1 && html`<button onClick=${() => removeQuestion(qi)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>вң•</button>`}
              </div>
              <textarea style=${{ ...inputStyle, minHeight: 50, marginBottom: 8 }} placeholder="л¬ём ң лӮҙмҡ©" value=${q.q} onChange=${(e) => setQ(qi, e.target.value)} />
              ${q.choices.map((c, ci) => html`
                <div key=${ci} style=${{ display: "flex", gap: 6, alignItems: "center", marginBottom: 5 }}>
                  <input type="radio" checked=${q.answer === ci} onChange=${() => setAnswer(qi, ci)} />
                  <input style=${{ ...inputStyle, flex: 1 }} placeholder=${`ліҙкё° ${ci + 1}`} value=${c} onChange=${(e) => setChoice(qi, ci, e.target.value)} />
                  ${q.choices.length > 2 && html`<button onClick=${() => removeChoice(qi, ci)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>вң•</button>`}
                </div>
              `)}
              <button onClick=${() => addChoice(qi)} style=${{ background: "none", border: "none", color: C.navy, fontSize: 12, cursor: "pointer", padding: 0, marginTop: 4 }}>+ ліҙкё° м¶”к°Җ</button>
              <div style=${{ fontSize: 11, color: C.slate, marginTop: 4 }}>лқјл””мҳӨ лІ„нҠјмңјлЎң м •лӢөмқ„ н‘ңмӢңн•ҳм„ёмҡ”.</div>
            </div>
          `)}
          <${Button} variant="ghost" onClick=${addQuestion} style=${{ marginBottom: 12 }}>+ л¬ём ң м¶”к°Җ<//>
          <div style=${{ display: "flex", gap: 8 }}>
            <${Button} variant="gold" onClick=${save}>м ҖмһҘ<//>
            <${Button} variant="ghost" onClick=${() => setCreating(false)}>м·ЁмҶҢ<//>
          </div>
        <//>
      `}
      <${SectionLabel} n=${2} label="л“ұлЎқлҗң мӢңн—ҳ" />
      ${data.examTests.length === 0 && html`<${Empty} text="м•„м§Ғ л§Ңл“  мӢңн—ҳмқҙ м—Ҷм–ҙмҡ”." />`}
      ${data.examTests.map((t) => {
        const results = data.examResults.filter((r) => r.testId === t.id);
        return html`
          <${Card} key=${t.id}>
            <div style=${{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style=${{ fontWeight: 700, color: C.navy }}>${t.title}</div>
                <div style=${{ fontSize: 11.5, color: C.slate, marginTop: 2 }}>${fmtDate(t.date)} В· л¬ём ң ${t.questions.length}к°ң</div>
              </div>
              <button onClick=${() => removeTest(t.id)} style=${{ background: "none", border: "none", color: C.slate, cursor: "pointer" }}>вң•</button>
            </div>
            ${results.length === 0 ? html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 8 }}>м•„м§Ғ мқ‘мӢңн•ҳм§Җ м•Ҡм•ҳм–ҙмҡ”.</div>` : html`
              <div style=${{ marginTop: 8, borderTop: `1px solid ${C.line}`, paddingTop: 8 }}>
                ${results.map((r) => html`<div key=${r.id} style=${{ fontSize: 12.5, marginBottom: 3 }}>${fmtDate(r.date)} мқ‘мӢң вҖ” <b>${r.score}</b> / ${r.total}</div>`)}
              </div>
            `}
          <//>
        `;
      })}
    </div>
  `;
}

      ` : html`

          <${Field} label="лӮ м§ң"><input style=${inputStyle} type="date" value=${date} onChange=${(e) => setDate(e.target.value)} /><//>
          <${Field} label="нҺҳмқҙм§Җ / лІ”мң„ (м„ нғқ)"><input style=${inputStyle} value=${pageRange} onChange=${(e) => setPageRange(e.target.value)} placeholder="мҳҲ: p.12-45, 1~45лІҲ" /><//>
          <${Field} label="м •лӢө (мҲңм„ңлҢҖлЎң, мүјн‘ңлӮҳ лқ„м–ҙм“°кё°лЎң кө¬л¶„)">
            <textarea style=${{ ...inputStyle, minHeight: 90, fontFamily: "monospace" }} value=${keyText} onChange=${(e) => setKeyText(e.target.value)} placeholder=${"мҳҲ: 2,3,1,4,5,2,1,3,4,5 ...\n(1лІҲл¶Җн„° мҲңм„ңлҢҖлЎң м •лӢө лІҲнҳё)"} />

      ${groupByDate(list, "date").map((grp) => html`

          ${grp.items.map((t) => {

                </div>
              `}
            `}
          <//>
        `;
          })}

function MockExamTaker({ test, onExit, onSubmit }) {
  const total = test.answerKey.length;
  const [answers, setAnswers] = useState(Array(total).fill(""));
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [wrong, setWrong] = useState([]);

  function pick(i, val) { if (submitted) return; setAnswers((a) => a.map((v, idx) => (idx === i ? val : v))); }

  function submit() {
    let score = 0; const wrongNums = [];
    test.answerKey.forEach((correct, i) => {
      if (normText(answers[i]) === normText(correct) && normText(answers[i]).length > 0) score++;
      else wrongNums.push(i + 1);
    });
    setResult(score); setWrong(wrongNums); setSubmitted(true);
  }

  if (submitted) {
    return html`
      <div>
        <${Card} style=${{ textAlign: "center", padding: 28 }}>
          <div style=${{ ...serif, fontSize: 20, color: C.navy, marginBottom: 8 }}>${test.title}</div>
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 16 }}>мұ„м җ кІ°кіј</div>
          <div style=${{ fontSize: 34, ...serif, color: C.gold }}>${result} <span style=${{ fontSize: 18, color: C.slate }}>/ ${total}</span></div>
          ${wrong.length > 0 && html`<div style=${{ fontSize: 13, color: C.danger, marginTop: 10 }}>нӢҖлҰ° л¬ём ң: ${wrong.join(", ")}лІҲ</div>`}
        <//>
        <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} onClick=${() => onSubmit(result, total, wrong)}>кІ°кіј м ҖмһҘн•ҳкі  лӮҳк°Җкё°<//>
      </div>
    `;
  }

  return html`
    <div>
      <${BackBtn} onClick=${onExit} />
      <div style=${{ ...serif, fontSize: 18, color: C.navy, marginBottom: 2 }}>${test.title}</div>
      ${test.pageRange && html`<div style=${{ fontSize: 12.5, color: C.slate, marginBottom: 12 }}>${test.pageRange}</div>`}
      <${Card}>
        <div style=${{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          ${test.answerKey.map((_, i) => html`
            <div key=${i} style=${{ width: 62 }}>
              <div style=${{ fontSize: 11, color: C.gold, fontWeight: 700, marginBottom: 3, textAlign: "center" }}>${i + 1}</div>
              <input style=${{ ...inputStyle, padding: "8px 6px", textAlign: "center" }} inputMode="numeric" pattern="[0-9]*" value=${answers[i]} onChange=${(e) => pick(i, e.target.value.replace(/[^0-9]/g, ""))} />
            </div>
          `)}
        </div>
      <//>
      <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} disabled=${answers.some((a) => !a.trim())} onClick=${submit}>м ңм¶ңн•ҳкё°<//>
    </div>
  `;
}

// ---------- Student dashboard ----------
function StudentDash({ student, ensureData, updateData, dataCache, onLogout }) {
  const [tab, setTab] = useState("logs");
  const [data, setData] = useState(null);
  const [activeTest, setActiveTest] = useState(null);
  const [activeMock, setActiveMock] = useState(null);

  useEffect(() => { (async () => { const d = await ensureData(student.id); setData(d); })(); }, [student.id]);
  useEffect(() => { if (dataCache[student.id]) setData(dataCache[student.id]); }, [dataCache, student.id]);

  const tabs = [
    { key: "byDate", label: "лӮ м§ңлі„ ліҙкё°", icon: "рҹ“…" },
    { key: "logs", label: "мҳӨлҠҳмқҳ н•ҷмҠө", icon: "рҹ“ҳ" },
    { key: "homework", label: "мҲҷм ң", icon: "рҹ“қ" },
    { key: "vocab", label: "лӢЁм–ҙ мһ¬мӢңн—ҳ", icon: "рҹ”Ө" },
    { key: "exam", label: "м¶”к°Җ мӢңн—ҳ", icon: "рҹ—’" },
    { key: "mock", label: "лӘЁмқҳкі мӮ¬", icon: "рҹ“„" },
  ];

  if (!data) return html`<${Empty} text="л¶Ҳлҹ¬мҳӨлҠ” мӨ‘..." />`;

  if (activeMock) {
    return html`<${MockExamTaker} test=${activeMock} onExit=${() => setActiveMock(null)}
      onSubmit=${async (score, total, wrong) => {
        try {
          await updateData(student.id, (d) => ({ ...d, mockExamResults: [{ id: uid(), testId: activeMock.id, date: today(), score, total, wrong }, ...(d.mockExamResults || [])] }));
        } catch (e) {
          console.error("кІ°кіј м ҖмһҘ мӢӨнҢЁ", e);
          alert(friendlyErrorMessage(e));
        }
        setActiveMock(null);
      }} />`;
  }

  if (activeTest) {
    return html`<${TestTaker} activeTest=${activeTest} onExit=${() => setActiveTest(null)}
      onSubmit=${async (score, total, breakdown) => {
        try {
          if (activeTest.type === "vocab") await updateData(student.id, (d) => ({ ...d, vocabResults: [{ id: uid(), testId: activeTest.test.id, date: today(), score, total, breakdown }, ...d.vocabResults] }));
          else await updateData(student.id, (d) => ({ ...d, examResults: [{ id: uid(), testId: activeTest.test.id, date: today(), score, total, breakdown }, ...d.examResults] }));
        } catch (e) {
          console.error("кІ°кіј м ҖмһҘ мӢӨнҢЁ", e);
          alert(friendlyErrorMessage(e));
        }
        setActiveTest(null);
      }} />`;
  }

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style=${{ ...serif, fontSize: 19, color: C.navy }}>${student.name} н•ҷмғқ</div>
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>лЎңк·ём•„мӣғ</button>
      </div>
      <${Tabs} tabs=${tabs} active=${tab} onChange=${setTab} />

      ${tab === "byDate" && html`<${DateView} data=${data} role="student" />`}

function HomeworkStudentCard({ h, studentId, updateData }) {
  const [busy, setBusy] = useState(false); const [err, setErr] = useState("");
  const inputId = `hwphoto-${h.id}`;
  const photos = h.photos || (h.photo ? [h.photo] : []);

  async function handleFile(e) {
    const files = Array.from(e.target.files || []);
    e.target.value = "";
    if (files.length === 0) return;
    setErr(""); setBusy(true);
    try {
      const newOnes = [];
      let runningTotal = photos.reduce((sum, p) => sum + p.length, 0);
      const BUDGET = 650000; // leaves headroom under Firestore's 1MB-per-document cap for this student's other data
      for (const file of files) {
        const dataUrl = await compressImage(file, 700, 0.55);
        if (dataUrl.length > 250000) { setErr("мӮ¬м§„ н•ң мһҘмқҳ мҡ©лҹүмқҙ л„Ҳл¬ҙ м»Өм„ң кұҙл„Ҳлӣ°м—Ҳм–ҙмҡ”."); continue; }
        if (runningTotal + dataUrl.length > BUDGET) { setErr("мӮ¬м§„мқ„ лҚ” лӢҙкё°м—” мҡ©лҹүмқҙ л¶ҖмЎұн•ҙмҡ”. лӘҮ мһҘмқ„ м§Җмҡ°кі  лӢӨмӢң м¶”к°Җн•ҙ мЈјм„ёмҡ”."); break; }
        runningTotal += dataUrl.length;
        newOnes.push(dataUrl);
      }
      if (newOnes.length > 0) {
        await updateData(studentId, (d) => ({
          ...d,
          homework: (d.homework || []).map((x) => (x.id === h.id ? { ...withoutLegacyPhoto(x), photos: [...(x.photos || (x.photo ? [x.photo] : [])), ...newOnes], done: true } : x)),
        }));
      }
    } catch (e) { setErr(friendlyErrorMessage(e)); }
    setBusy(false);
  }
  async function removePhoto(idx) {
    await updateData(studentId, (d) => ({
      ...d,
      homework: (d.homework || []).map((x) => (x.id === h.id ? { ...withoutLegacyPhoto(x), photos: (x.photos || (x.photo ? [x.photo] : [])).filter((_, i) => i !== idx) } : x)),
    }));
  }
  async function toggleDone() { await updateData(studentId, (d) => ({ ...d, homework: (d.homework || []).map((x) => (x.id === h.id ? { ...x, done: !x.done } : x)) })); }

  return html`
    <${Card}>
      <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>лӮҙмӨҖ лӮ м§ң ${fmtDate(h.assignedDate)}</div>
      <div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${h.content}</div>
      ${photos.length > 0 && html`
        <div style=${{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8 }}>
          ${photos.map((p, pi) => html`
            <div key=${pi} style=${{ position: "relative" }}>
              <img src=${p} style=${{ width: 76, height: 76, objectFit: "cover", borderRadius: 4, border: `1px solid ${C.line}`, display: "block" }} />
              <button onClick=${() => removePhoto(pi)} style=${{ position: "absolute", top: -6, right: -6, width: 20, height: 20, borderRadius: "50%", border: "none", background: C.danger, color: "#fff", fontSize: 11, cursor: "pointer", lineHeight: "20px", padding: 0 }}>вң•</button>
            </div>
          `)}
        </div>
      `}
      <div style=${{ display: "flex", alignItems: "center", gap: 12, marginTop: 10, flexWrap: "wrap" }}>
        <label htmlFor=${busy ? undefined : inputId} style=${{ fontSize: 12.5, fontWeight: 600, padding: "8px 14px", borderRadius: 3, border: `1px solid ${C.navy}`, color: busy ? C.slate : C.navy, cursor: busy ? "default" : "pointer", opacity: busy ? 0.6 : 1, pointerEvents: busy ? "none" : "auto" }}>
          ${busy ? "м—…лЎңл“ң мӨ‘..." : photos.length > 0 ? "мқёмҰқмғ· м¶”к°Җн•ҳкё°" : "мқёмҰқмғ· мҳ¬лҰ¬кё°"}
        </label>
        <input id=${inputId} type="file" accept="image/*" multiple onChange=${handleFile} style=${{ display: "none" }} disabled=${busy} />

        <div onClick=${toggleDone} style=${{ display: "inline-flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 12.5, color: h.done ? C.gold : C.slate, fontWeight: 600 }}>
          ${h.done ? "вң“ мҷ„лЈҢн•Ё" : "мҷ„лЈҢлЎң н‘ңмӢңн•ҳкё°"}
        </div>
      </div>
      ${err && html`<div style=${{ fontSize: 11.5, color: C.danger, marginTop: 6 }}>${err}</div>`}
    <//>
  `;
}

function withoutLegacyPhoto(obj) {
  const { photo, ...rest } = obj;
  return rest;
}
function friendlyErrorMessage(e) {
  const msg = ((e && e.message) || "").toLowerCase();
  const code = (e && e.code) || "";
  if (msg.includes("longer than") || msg.includes("exceeds") || msg.includes("too large") || code === "invalid-argument" || code === "resource-exhausted") {
    return "мқҙ н•ҷмғқмқҳ м ҖмһҘ кіөк°„мқҙ к°Җл“қ м°јм–ҙмҡ” (мӮ¬м§„мқҙ л„Ҳл¬ҙ л§Һмқҙ мҢ“мҳҖмқ„ л•Ң мғқкІЁмҡ”). мҳӨлһҳлҗң мӮ¬м§„мқ„ лӘҮ мһҘ м§Җмҡҙ л’Ө лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”.";
  }
  if (code === "permission-denied") {
    return "м ҖмһҘ к¶Ңн•ң л¬ём ңк°Җ мһҲм–ҙмҡ”. Firebase мҪҳмҶ”м—җм„ң Firestore ліҙм•Ҳ к·ңм№ҷмқ„ нҷ•мқён•ҙ мЈјм„ёмҡ”.";
  }
  return "м ҖмһҘн•ҳлҠ” лҚ° л¬ём ңк°Җ мһҲм—Ҳм–ҙмҡ”. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҳкі  лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”.";
}

function checkWordAnswer(userAnswer, correctWord, synonyms) {
  const norm = normText(userAnswer);
  if (!norm) return false;
  if (norm === normText(correctWord)) return true;
  if ((synonyms || []).some((s) => normText(s) === norm)) return true;
  return isKnownSynonym(userAnswer, correctWord);
}

function TestTaker({ activeTest, onExit, onSubmit }) {
  const { type, test } = activeTest;
  const questions = type === "vocab" ? test.words : test.questions;
  const total = questions.length;
  const [directions] = useState(() => (type === "vocab" ? questions.map(() => (Math.random() < 0.5 ? "w2m" : "m2w")) : null));
  const [answers, setAnswers] = useState(type === "vocab" ? Array(total).fill("") : Array(total).fill(null));
  const [submitted, setSubmitted] = useState(false);
  const [result, setResult] = useState(null);
  const [breakdown, setBreakdown] = useState(null);

  function pick(qi, val) { if (submitted) return; setAnswers((a) => a.map((v, idx) => (idx === qi ? val : v))); }

  function submit() {
    let score = 0; const rows = [];
    questions.forEach((q, i) => {
      if (type === "vocab") {
        const dir = directions[i];
        if (dir === "w2m") {
          const ok = checkVocabAnswer(answers[i], q.meaning, q.synonyms);
          if (ok) score++;
          rows.push({ prompt: q.word, given: answers[i] || "(л№Ҳм№ё)", correct: q.meaning, ok });
        } else {
          const ok = checkWordAnswer(answers[i], q.word, q.synonyms);
          if (ok) score++;
          const correctDisplay = (q.synonyms && q.synonyms.length) ? `${q.word} (${q.synonyms.join(", ")}лҸ„ м •лӢө)` : q.word;
          rows.push({ prompt: q.meaning, given: answers[i] || "(л№Ҳм№ё)", correct: correctDisplay, ok });
        }
      } else {
        const ok = answers[i] === q.answer;
        if (ok) score++;
        rows.push({ prompt: q.q, given: answers[i] != null ? q.choices[answers[i]] : "(м„ нғқ м•Ҳ н•Ё)", correct: q.choices[q.answer], ok });
      }
    });
    setResult(score); setBreakdown(rows); setSubmitted(true);
  }

  if (submitted) {
    return html`
      <div>
        <${Card} style=${{ textAlign: "center", padding: 28 }}>
          <div style=${{ ...serif, fontSize: 20, color: C.navy, marginBottom: 8 }}>${test.title}</div>
          <div style=${{ fontSize: 12, color: C.slate, marginBottom: 16 }}>мұ„м җ кІ°кіј</div>
          <div style=${{ fontSize: 34, ...serif, color: C.gold }}>${result} <span style=${{ fontSize: 18, color: C.slate }}>/ ${total}</span></div>
        <//>
        ${breakdown && html`
          <${Card}>
            ${breakdown.map((r, i) => html`
              <div key=${i} style=${{ padding: "8px 0", borderBottom: i < breakdown.length - 1 ? `1px solid ${C.line}` : "none" }}>
                <div style=${{ fontSize: 12.5, fontWeight: 700, color: C.navy, whiteSpace: "pre-wrap" }}>${i + 1}. ${r.prompt}</div>
                <div style=${{ fontSize: 12, marginTop: 3, color: r.ok ? C.navy : C.danger }}>лӮҙ лӢө: ${r.given} ${r.ok ? "вң“" : "вң—"}</div>
                ${!r.ok && html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 1 }}>м •лӢө: ${r.correct}</div>`}
              </div>
            `)}
          <//>
        `}
        <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} onClick=${() => onSubmit(result, total, breakdown)}>кІ°кіј м ҖмһҘн•ҳкі  лӮҳк°Җкё°<//>
      </div>
    `;
  }

  return html`
    <div>
      <${BackBtn} onClick=${onExit} />
      <div style=${{ ...serif, fontSize: 18, color: C.navy, marginBottom: 12 }}>${test.title}</div>
      ${questions.map((q, qi) => html`
        <${Card} key=${qi}>
          <div style=${{ fontSize: 13, fontWeight: 700, color: C.navy, marginBottom: 10, whiteSpace: "pre-wrap" }}>${qi + 1}. ${type === "vocab" ? (directions[qi] === "w2m" ? q.word : q.meaning) : q.q}</div>
          ${type === "vocab" ? html`
            <input style=${inputStyle} placeholder=${directions[qi] === "w2m" ? "лң»мқ„ мһ…л Ҙн•ҳм„ёмҡ”" : "мҳҒм–ҙ лӢЁм–ҙлҘј мһ…л Ҙн•ҳм„ёмҡ”"} value=${answers[qi]} onChange=${(e) => pick(qi, e.target.value)} />
          ` : q.choices.map((opt, oi) => {
            const selected = answers[qi] === oi;
            return html`
              <div key=${oi} onClick=${() => pick(qi, oi)} style=${{ padding: "9px 12px", border: `1px solid ${selected ? C.gold : C.line}`, background: selected ? "#FBF4EA" : C.white, borderRadius: 3, marginBottom: 6, fontSize: 13, cursor: "pointer" }}>${opt}</div>
            `;
          })}
        <//>
      `)}
      <${Button} variant="gold" style=${{ width: "100%", justifyContent: "center" }} disabled=${answers.some((a) => a === null || a === "")} onClick=${submit}>м ңм¶ңн•ҳкё°<//>
    </div>
  `;
}

  const tabs = [
    { key: "byDate", label: "лӮ м§ңлі„ ліҙкё°", icon: "рҹ“…" },
    { key: "logs", label: "н•ҷмҠө кё°лЎқ", icon: "рҹ“ҳ" },
    { key: "homework", label: "мҲҷм ң", icon: "рҹ“қ" },
    { key: "consult", label: "мғҒлӢҙ мӢ мІӯ", icon: "рҹ—“" },
  ];

  if (!data) return html`<${Empty} text="л¶Ҳлҹ¬мҳӨлҠ” мӨ‘..." />`;

  return html`
    <div>
      <div style=${{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
        <div style=${{ ...serif, fontSize: 19, color: C.navy }}>${student.name} н•ҷмғқ н•ҷл¶ҖлӘЁлӢҳ</div>
        <button onClick=${onLogout} style=${{ background: "none", border: "none", color: C.slate, fontSize: 12.5, cursor: "pointer" }}>лЎңк·ём•„мӣғ</button>
      </div>
      <${Tabs} tabs=${tabs} active=${tab} onChange=${setTab} />

      ${tab === "byDate" && html`<${DateView} data=${data} role="parent" />`}

      ${tab === "logs" && (data.logs.length === 0 ? html`<${Empty} text="м•„м§Ғ л“ұлЎқлҗң н•ҷмҠө кё°лЎқмқҙ м—Ҷм–ҙмҡ”." />` : data.logs.map((l) => html`
        <${Card} key=${l.id}><div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>${fmtDate(l.date)}</div><div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${l.content}</div><//>
      `))}

      ${tab === "homework" && ((data.homework || []).length === 0 ? html`<${Empty} text="м•„м§Ғ л“ұлЎқлҗң мҲҷм ңк°Җ м—Ҷм–ҙмҡ”." />` :
        groupByDate(data.homework || [], "dueDate").map((grp) => html`
          <div key=${grp.date}>
            <div style=${{ fontSize: 12.5, fontWeight: 700, color: C.navy, margin: "14px 0 6px", borderBottom: `1px solid ${C.line}`, paddingBottom: 4 }}>кё°н•ң ${fmtDateDay(grp.date)}</div>
            ${grp.items.map((h) => html`
              <${Card} key=${h.id}>
                <div style=${{ fontSize: 11.5, color: C.gold, fontWeight: 700 }}>лӮҙмӨҖ лӮ м§ң ${fmtDate(h.assignedDate)}</div>
                <div style=${{ fontSize: 13.5, marginTop: 6, whiteSpace: "pre-wrap" }}>${h.content}</div>
                ${(h.photos || (h.photo ? [h.photo] : [])).length > 0 && html`
                  <div style=${{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8 }}>
                    ${(h.photos || (h.photo ? [h.photo] : [])).map((p, pi) => html`<img key=${pi} src=${p} style=${{ width: 70, height: 70, objectFit: "cover", borderRadius: 4, border: `1px solid ${C.line}` }} />`)}
                  </div>
                `}
                ${(h.audios || (h.audio ? [h.audio] : [])).map((a, ai) => html`<audio key=${ai} controls src=${a} style=${{ width: "100%", height: 32, marginTop: 8 }} />`)}
                <div style=${{ marginTop: 8, fontSize: 12.5, color: h.done ? C.gold : C.slate, fontWeight: 600 }}>${h.done ? "вң“ мҷ„лЈҢн•Ё" : "м•„м§Ғ лҜёмҷ„лЈҢ"}</div>
              <//>
            `)}
          </div>
        `))}

      ${tab === "consult" && html`<${ConsultRequestPanel} student=${student} data=${data} updateData=${(updater) => updateData(student.id, updater)} />`}
    </div>
  `;
}

function ConsultRequestPanel({ data, updateData }) {
  const [method, setMethod] = useState("м№ҙнҶЎ мғҒлӢҙ");
  const [d1, setD1] = useState(""); const [t1, setT1] = useState("");
  const [d2, setD2] = useState(""); const [t2, setT2] = useState("");
  const [d3, setD3] = useState(""); const [t3, setT3] = useState("");
  const [note, setNote] = useState("");
  const [sent, setSent] = useState(false);

  async function submit() {
    if (!d1 || !t1) return;
    const req = {
      id: uid(), createdAt: today(), method, note, status: "лҢҖкё°",
      choices: [{ date: d1, time: t1 }, ...(d2 ? [{ date: d2, time: t2 }] : []), ...(d3 ? [{ date: d3, time: t3 }] : [])],
    };
    await updateData((d) => ({ ...d, consultRequests: [req, ...(d.consultRequests || [])] }));
    setD1(""); setT1(""); setD2(""); setT2(""); setD3(""); setT3(""); setNote("");
    setSent(true);
    setTimeout(() => setSent(false), 3000);
  }

  const list = data.consultRequests || [];
  return html`
    <div>
      <${Card}>
        <div style=${{ fontSize: 12, color: C.slate, marginBottom: 10 }}>нқ¬л§қн•ҳмӢңлҠ” мғҒлӢҙ л°©мӢқкіј лӮ м§ңВ·мӢңк°„лҢҖлҘј 1м§Җл§қл¶Җн„° мҲңм„ңлҢҖлЎң мһ…л Ҙн•ҙ мЈјм„ёмҡ”.</div>
        <${Field} label="мғҒлӢҙ л°©мӢқ">
          <select style=${inputStyle} value=${method} onChange=${(e) => setMethod(e.target.value)}>
            <option value="м№ҙнҶЎ мғҒлӢҙ">м№ҙнҶЎ мғҒлӢҙ</option>
            <option value="м „нҷ” мғҒлӢҙ">м „нҷ” мғҒлӢҙ</option>
            <option value="лҢҖл©ҙ мғҒлӢҙ">лҢҖл©ҙ мғҒлӢҙ</option>
          </select>
        <//>
        <div style=${{ fontSize: 11.5, color: C.slate, fontWeight: 700, marginTop: 10, marginBottom: 4 }}>1м§Җл§қ (н•„мҲҳ)</div>
        <div style=${{ display: "flex", gap: 8 }}>
          <div style=${{ flex: 1 }}><input style=${inputStyle} type="date" value=${d1} onChange=${(e) => setD1(e.target.value)} /></div>
          <div style=${{ flex: 1 }}><input style=${inputStyle} value=${t1} onChange=${(e) => setT1(e.target.value)} placeholder="мҳҲ: мҳӨнӣ„ 3мӢң" /></div>
        </div>
        <div style=${{ fontSize: 11.5, color: C.slate, fontWeight: 700, marginTop: 10, marginBottom: 4 }}>2м§Җл§қ (м„ нғқ)</div>
        <div style=${{ display: "flex", gap: 8 }}>
          <div style=${{ flex: 1 }}><input style=${inputStyle} type="date" value=${d2} onChange=${(e) => setD2(e.target.value)} /></div>
          <div style=${{ flex: 1 }}><input style=${inputStyle} value=${t2} onChange=${(e) => setT2(e.target.value)} placeholder="мҳҲ: мҳӨнӣ„ 3мӢң" /></div>
        </div>
        <div style=${{ fontSize: 11.5, color: C.slate, fontWeight: 700, marginTop: 10, marginBottom: 4 }}>3м§Җл§қ (м„ нғқ)</div>
        <div style=${{ display: "flex", gap: 8 }}>
          <div style=${{ flex: 1 }}><input style=${inputStyle} type="date" value=${d3} onChange=${(e) => setD3(e.target.value)} /></div>
          <div style=${{ flex: 1 }}><input style=${inputStyle} value=${t3} onChange=${(e) => setT3(e.target.value)} placeholder="мҳҲ: мҳӨнӣ„ 3мӢң" /></div>
        </div>
        <${Field} label="м „н•ҳкі  мӢ¶мқҖ лӮҙмҡ© (м„ нғқ)"><textarea style=${{ ...inputStyle, minHeight: 60, marginTop: 6 }} value=${note} onChange=${(e) => setNote(e.target.value)} /><//>
        <${Button} variant="gold" style=${{ marginTop: 10 }} disabled=${!d1 || !t1} onClick=${submit}>мғҒлӢҙ мӢ мІӯн•ҳкё°<//>
        ${sent && html`<div style=${{ fontSize: 12, color: C.navy, marginTop: 8 }}>мӢ мІӯлҗҗм–ҙмҡ”. м„ мғқлӢҳмқҙ нҷ•мқё нӣ„ м—°лқҪл“ңлҰҙ кұ°мҳҲмҡ”.</div>`}
      <//>
      ${list.length > 0 && html`
        <div style=${{ fontSize: 11.5, color: C.slate, fontWeight: 700, margin: "16px 0 8px" }}>мӢ мІӯ лӮҙм—ӯ</div>
        ${list.map((r) => html`
          <${Card} key=${r.id}>
            <div style=${{ fontSize: 12, color: C.gold, fontWeight: 700 }}>${r.method} В· ${r.status}</div>
            ${r.choices.map((c, i) => html`<div key=${i} style=${{ fontSize: 12.5, marginTop: 4 }}>${i + 1}м§Җл§қ: ${c.date} ${c.time}</div>`)}
            ${r.note && html`<div style=${{ fontSize: 12, color: C.slate, marginTop: 4 }}>${r.note}</div>`}
          <//>
        `)}
      `}
    </div>
  `;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(html`<${App} />`);
}); // end DOMContentLoaded
</script>
</body>
</html>
